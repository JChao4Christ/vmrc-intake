<style>
  :root{
    --navy:#1e3a5f; --navy-d:#162d4a; --navy-dd:#0f2035;
    --cyan:#7ec8e3; --green:#27ae60; --green-d:#1e8e4e; --amber:#f1c40f;
    --bg:#eef3f8; --card:#ffffff; --ink:#16202c; --muted:#5b6b7d;
    --line:#d4dde7; --field:#ffffff; --fieldline:#c3d1e0;
    --chip:#eaf1f8; --chipline:#c9d8e8; --chipink:#1e3a5f;
    --shadow:0 10px 36px rgba(20,40,70,.14);
    --bub:#ffffff;
  }
  [data-theme="dark"]{
    --bg:#0c1521; --card:#15212f; --ink:#e9f0f7; --muted:#9fb1c4;
    --line:#27394d; --field:#0f1b29; --fieldline:#2c3f54;
    --chip:#13242f; --chipline:#2a3f52; --chipink:#9fe0f3;
    --shadow:0 10px 36px rgba(0,0,0,.5); --bub:#0f1b29;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Segoe UI",Calibri,Arial,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.5;
    display:flex; flex-direction:column; min-height:100%;
    transition:background .3s,color .3s;
  }

  /* ── Top bar ── */
  .bar{
    background:linear-gradient(135deg,var(--navy),var(--navy-d));
    color:#fff; padding:13px 16px; position:sticky; top:0; z-index:30;
    box-shadow:0 2px 14px rgba(0,0,0,.28);
  }
  .bar-row{display:flex;align-items:center;gap:10px;max-width:640px;margin:0 auto}
  .bar .org{font-size:10px;letter-spacing:.12em;color:var(--cyan);font-weight:800;text-transform:uppercase}
  .bar .ttl{font-size:15.5px;font-weight:800;line-height:1.15}
  .bar .spacer{flex:1}

  /* centered VMRC brand block: logo + title together (scrolls away; navy bar stays sticky) */
  .brand{background:#fff;text-align:center;padding:16px 16px 14px;border-bottom:1px solid #e1e8f0}
  .vlogo{height:120px;width:auto;display:inline-block}
  .bar-title{font-size:15px;font-weight:800;color:#fff;line-height:1.15}
  .iconbtn{
    background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.26);color:#fff;
    border-radius:30px;padding:6px 12px;font-size:12.5px;font-weight:700;cursor:pointer;
    display:flex;align-items:center;gap:6px;white-space:nowrap;transition:.15s;
  }
  .iconbtn:hover{background:rgba(255,255,255,.22)}
  /* progress */
  .progwrap{max-width:640px;margin:9px auto 0}
  .prog{height:7px;background:rgba(255,255,255,.22);border-radius:5px;overflow:hidden}
  .prog>i{display:block;height:100%;width:0;background:var(--cyan);border-radius:5px;transition:width .35s}
  .progtxt{font-size:11px;color:var(--cyan);margin-top:4px;font-weight:600}
  /* segmented step bar — click anywhere along it to jump to that step */
  .segwrap{max-width:640px;margin:10px auto 0}
  .segbar{display:flex;gap:3px}
  .segbar .seg{flex:1;min-width:0;height:32px;border:none;background:rgba(255,255,255,.14);
    color:rgba(255,255,255,.72);border-radius:6px;font-size:12.5px;font-weight:800;cursor:pointer;
    display:flex;align-items:center;justify-content:center;font-family:inherit;padding:0;transition:.15s}
  .segbar .seg:hover{background:rgba(255,255,255,.30);color:#fff}
  .segbar .seg.done{background:rgba(126,200,227,.55);color:#06243a}
  .segbar .seg.active{background:var(--cyan);color:#06243a;box-shadow:0 0 0 2px rgba(255,255,255,.6)}
  .seglabel{display:flex;align-items:center;justify-content:center;gap:6px;font-size:12px;color:var(--cyan);font-weight:700;margin-top:7px}

  /* ── Stage ── */
  main{flex:1;width:100%;max-width:640px;margin:0 auto;padding:18px 16px 26px}
  .step{display:none;animation:fade .35s ease}
  .step.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  .intro{
    display:flex;gap:11px;align-items:flex-start;background:var(--bub);
    border:1px solid var(--line);border-left:4px solid var(--cyan);
    border-radius:14px;border-top-left-radius:5px;padding:13px 15px;margin-bottom:6px;
    box-shadow:0 2px 10px rgba(20,40,70,.05);
  }
  .intro .av{flex:none;width:38px;height:38px;border-radius:50%;background:var(--navy);color:#fff;
    display:flex;align-items:center;justify-content:center;box-shadow:0 3px 9px rgba(20,40,70,.18)}
  .intro .av svg{display:block}
  .rev-ic{display:inline-flex;align-items:center;gap:7px}
  .ic{flex:none}
  .intro h2{font-size:17px;margin-bottom:2px}
  .intro p{font-size:13.5px;color:var(--muted)}

  .field{margin-top:16px}
  .field > label{display:block;font-weight:700;font-size:14.5px;margin-bottom:6px}
  .field .hint{font-size:12.5px;color:var(--muted);font-weight:400;margin-top:-3px;margin-bottom:7px}
  .opt{font-size:11.5px;color:var(--muted);font-weight:600;background:var(--chip);border:1px solid var(--chipline);
       border-radius:10px;padding:1px 7px;margin-left:6px;vertical-align:middle}
  input[type=text],input[type=tel],input[type=email],input[type=date],textarea,select{
    width:100%;background:var(--field);color:var(--ink);
    border:1.5px solid var(--fieldline);border-radius:11px;
    padding:12px 13px;font-size:15px;font-family:inherit;transition:.15s;
  }
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 0 3px rgba(126,200,227,.25)}
  textarea{min-height:78px;resize:vertical;line-height:1.45}
  ::placeholder{color:var(--muted);opacity:.7}

  /* chips */
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{
    background:var(--chip);border:1.5px solid var(--chipline);color:var(--chipink);
    border-radius:22px;padding:9px 15px;font-size:14px;font-weight:600;cursor:pointer;
    transition:.12s;user-select:none;display:flex;align-items:center;gap:6px;
  }
  .chip:hover{transform:translateY(-1px)}
  .chip.on{background:var(--green);border-color:var(--green);color:#fff}
  .chip.on::before{content:"✓";font-weight:900}
  .chip.none.on{background:var(--navy);border-color:var(--navy)}

  /* repeat rows (meds / contacts) */
  .repeat{margin-top:6px}
  .rrow{display:flex;gap:8px;margin-top:8px;align-items:center;flex-wrap:wrap}
  .rrow input{flex:1 1 120px;min-width:0}
  .rrow .del{flex:none;width:44px;height:44px;border-radius:10px;border:none;
    background:#fdecea;color:#c0392b;font-size:20px;font-weight:800;line-height:1;cursor:pointer;transition:.12s}
  .rrow .del:hover{background:#c0392b;color:#fff}
  [data-theme="dark"] .rrow .del{background:#3a2226;color:#ff8a80}
  [data-theme="dark"] .rrow .del:hover{background:#c0392b;color:#fff}
  .addbtn{margin-top:9px;background:none;border:1.5px dashed var(--cyan);color:var(--navy);
    border-radius:11px;padding:10px;width:100%;font-size:14px;font-weight:700;cursor:pointer}
  [data-theme="dark"] .addbtn{color:var(--cyan)}

  /* add-your-own row + custom chips */
  .addother{display:flex;gap:8px;margin-top:10px}
  .addother-inp{flex:1}
  .addother-btn{flex:none;background:var(--navy);color:#fff;border:none;border-radius:11px;padding:0 18px;font-size:14px;font-weight:800;cursor:pointer;white-space:nowrap}
  [data-theme="dark"] .addother-btn{background:var(--cyan);color:#06243a}
  .chip.custom{background:#fdf3da;border-color:#e6b800;color:#7a5b00}
  [data-theme="dark"] .chip.custom{background:#3a3320;border-color:#6b5d1f;color:#f1c40f}
  .chip.custom .cx{font-weight:900;opacity:.75;margin-left:2px}

  /* multi-select dropdown (checklist) */
  .dropdown{position:relative}
  .dd-head{width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;
    background:var(--field);border:1.5px solid var(--fieldline);border-radius:11px;padding:12px 13px;
    font-size:15px;color:var(--ink);cursor:pointer;font-family:inherit;text-align:left}
  .dd-head:focus{outline:none}
  .dd-head.open{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(126,200,227,.25)}
  .dd-summary{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .dd-summary.ph{color:var(--muted)}
  .dd-caret{flex:none;transition:transform .2s;color:var(--muted)}
  .dd-head.open .dd-caret{transform:rotate(180deg)}
  .dd-panel{margin-top:6px;background:var(--card);border:1.5px solid var(--fieldline);border-radius:12px;
    padding:6px;max-height:50vh;overflow:auto;box-shadow:var(--shadow)}
  .dd-opt{display:flex;align-items:center;gap:11px;padding:11px 10px;border-radius:8px;cursor:pointer;font-size:14.5px}
  .dd-opt:hover{background:var(--chip)}
  .dd-opt input{width:19px;height:19px;accent-color:var(--green);flex:none}
  .dd-opt .cx{color:var(--muted);font-style:italic;font-size:12px}

  /* single-select dropdown + medication picker */
  select[data-selectkey],select.medpicker{width:100%;background:var(--field);color:var(--ink);
    border:1.5px solid var(--fieldline);border-radius:11px;padding:12px 13px;font-size:15px;font-family:inherit;cursor:pointer}
  select[data-selectkey]:focus,select.medpicker:focus{outline:none;border-color:var(--cyan)}
  select.medpicker{margin-bottom:9px;font-weight:600}

  /* Medic Alert engraving rows */
  .engrave{display:grid;gap:8px}
  .eng-row{display:flex;align-items:center;gap:11px;background:var(--field);border:1.5px solid var(--fieldline);
    border-radius:11px;padding:11px 12px;font-size:14.5px;cursor:pointer}
  .eng-row input[type=checkbox]{width:19px;height:19px;accent-color:var(--green);flex:none}
  .eng-lbl{font-weight:700;flex:none;min-width:84px}
  .eng-val{color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .eng-val.empty{font-style:italic;opacity:.65}
  .eng-row.phone{cursor:default;flex-wrap:wrap;border-style:dashed}
  .eng-row.phone input{flex:1;min-width:150px;background:transparent;border:none;border-bottom:1.5px solid var(--fieldline);
    border-radius:0;padding:7px 2px;font-size:15px;color:var(--ink)}
  .eng-row.phone input:focus{outline:none;border-color:var(--cyan)}

  /* ── Nav ── */
  .nav{display:flex;gap:10px;margin-top:24px}
  .btn{flex:1;border:none;border-radius:13px;padding:14px;font-size:15.5px;font-weight:800;cursor:pointer;
    font-family:inherit;transition:.15s;display:flex;align-items:center;justify-content:center;gap:7px}
  .btn.primary{background:var(--green);color:#fff;box-shadow:0 5px 16px rgba(39,174,96,.32)}
  .btn.primary:hover{background:var(--green-d)}
  .btn.ghost{flex:0 0 auto;min-width:96px;background:transparent;border:1.5px solid var(--fieldline);color:var(--muted)}
  .btn.ghost:hover{border-color:var(--cyan);color:var(--ink)}
  .saved{text-align:center;font-size:12px;color:var(--muted);margin-top:12px;display:flex;align-items:center;justify-content:center;gap:6px}
  .saved b{color:var(--green)}

  /* ── Welcome ── */
  .welcome{text-align:center;padding:14px 6px}
  .welcome .big{width:74px;height:74px;border-radius:22px;background:linear-gradient(135deg,var(--navy),var(--navy-d));
    color:#fff;font-size:36px;display:flex;align-items:center;justify-content:center;margin:8px auto 16px;box-shadow:var(--shadow)}
  .welcome h1{font-size:24px;margin-bottom:8px}
  .welcome p{font-size:15px;color:var(--muted);max-width:430px;margin:0 auto 10px}
  .wpts{text-align:left;max-width:380px;margin:16px auto 0;display:grid;gap:9px}
  .wpts div{font-size:14px;display:flex;gap:10px;align-items:flex-start}
  .wpts .e{font-size:18px;flex:none}
  .langpick{display:flex;gap:10px;justify-content:center;margin:18px 0 4px}
  .langpick .chip{font-size:15px;padding:10px 20px}

  /* ── Review ── */
  .rev-sec{background:var(--card);border:1px solid var(--line);border-radius:14px;margin-top:12px;overflow:hidden;box-shadow:0 2px 10px rgba(20,40,70,.05)}
  .rev-head{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:var(--chip);font-weight:800;font-size:14px}
  .rev-head .edit{font-size:12.5px;color:var(--navy);background:#fff;border:1px solid var(--chipline);border-radius:18px;padding:4px 12px;cursor:pointer;font-weight:700}
  [data-theme="dark"] .rev-head .edit{background:#0f1b29;color:var(--cyan)}
  .rev-body{padding:6px 14px 12px}
  .rev-item{padding:7px 0;border-bottom:1px solid var(--line);font-size:14px}
  .rev-item:last-child{border-bottom:none}
  .rev-item .k{color:var(--muted);font-size:12.5px;font-weight:600}
  .rev-item .v{margin-top:1px;white-space:pre-wrap}
  .rev-item .v.empty{color:var(--muted);font-style:italic;opacity:.7}

  /* ── Done ── */
  .done{text-align:center;padding:30px 10px}
  .done .check{width:84px;height:84px;border-radius:50%;background:var(--green);color:#fff;font-size:46px;
    display:flex;align-items:center;justify-content:center;margin:0 auto 18px;box-shadow:0 8px 26px rgba(39,174,96,.4)}
  .done h1{font-size:24px;margin-bottom:8px}
  .done p{font-size:15px;color:var(--muted);max-width:420px;margin:0 auto 10px}

  /* fallback box */
  .fallback{display:none;margin-top:18px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;text-align:left}
  .fallback h3{font-size:15px;margin-bottom:8px}
  .fallback p{font-size:13px;color:var(--muted);margin-bottom:10px}
  .fallback textarea{min-height:120px;font-size:12px}
  .fbtns{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
  .fbtns .btn{flex:1;min-width:130px;font-size:13.5px;padding:11px}
  .btn.blue{background:var(--navy);color:#fff}
  .btn.gmail{background:#ea4335;color:#fff}

  .err{color:#c0392b;font-size:13px;font-weight:600;margin-top:8px;display:none}
  .footer{text-align:center;font-size:11px;color:var(--muted);padding:14px;opacity:.85}
  .lockicon{font-size:11px}
</style>
</head>

window.onerror = function(message, source, lineno){
  try {
    var s = document.getElementById("stage") || document.body;
    s.innerHTML = '<div style="margin:18px;padding:16px;border:2px solid #c0392b;border-radius:12px;'
      + 'background:#fdecea;color:#7a1f17;font:13px/1.55 ui-monospace,Consolas,monospace;'
      + 'white-space:pre-wrap;word-break:break-word">'
      + '⚠️ The form hit a startup error:\n\n' + message + '\n\n(line ' + lineno + ')\n\n'
      + 'Please screenshot this whole box and send it to your coordinator.</div>';
  } catch(e){}
  return true;
};

const SAVE_KEY = "vmrc_intake_draft_v1";
// Safe localStorage. Apps Script serves the form in a sandboxed iframe where
// storage access can THROW (esp. Incognito / third-party storage blocked).
// Wrapping it means a failure just disables auto-save instead of halting the
// whole script (which had left the page blank except the static header).
const LS = (function(){
  var store=null; try{ store=window.localStorage; }catch(e){}
  return {
    get:function(k){ try{ return store?store.getItem(k):null; }catch(e){ return null; } },
    set:function(k,v){ try{ if(store) store.setItem(k,v); }catch(e){} },
    remove:function(k){ try{ if(store) store.removeItem(k); }catch(e){} }
  };
})();
if (location.search.indexOf("fresh") > -1) LS.remove(SAVE_KEY);  // preview "start fresh"
let lang = LS.get(SAVE_KEY+"_lang") || "en";
let data = {};
try { data = JSON.parse(LS.get(SAVE_KEY)) || {}; } catch(e){ data = {}; }
let idx = (typeof data.__step === "number") ? data.__step : -1; // -1 = welcome
const tx = o => (o ? (typeof o[lang]==="function" ? o[lang] : (o[lang] ?? o.en)) : "");

   3) RENDER
   ═══════════════════════════════════════════════════════════════════ */
const stage = document.getElementById("stage");

function render(){
  stage.innerHTML = "";
  document.getElementById("footPriv").textContent = tx(T.footer);
  const _bt=document.getElementById("barTtl"); if(_bt) _bt.textContent=tx(T.formTitle);
  renderStepper();
  if (idx === -1){ renderWelcome(); return; }
  if (idx === STEPS.length){ renderReview(); return; }
  if (idx === STEPS.length+1){ renderDone(); return; }
  renderStep(STEPS[idx]);
  window.scrollTo({top:0,behavior:"smooth"});
}

// Segmented step bar: every step is an equal-width clickable cell, so the
// click position maps to the step (left = step 1, middle = ~step 5, etc.).
function renderStepper(){
  const w = document.getElementById("segWrap");
  if (idx < 0 || idx > STEPS.length){ w.style.display="none"; return; }  // hide on welcome/done
  w.style.display="block";
  const total = STEPS.length + 1; // steps + review
  let html = STEPS.map((s,i)=>`<button type="button" class="seg ${i===idx?"active":""} ${i<idx?"done":""}" data-go="${i}" title="${esc(tx(s.title))}" aria-label="${esc(tx(s.title))}">${i+1}</button>`).join("");
  html += `<button type="button" class="seg ${idx===STEPS.length?"active":""}" data-go="${STEPS.length}" title="${esc(tx(STEP_REVIEW_SHORT))}" aria-label="${esc(tx(STEP_REVIEW_SHORT))}">📑</button>`;
  const bar = document.getElementById("segBar");
  bar.innerHTML = html;
  bar.querySelectorAll(".seg").forEach(b=>b.onclick=()=>{ idx=+b.dataset.go; persist(); render(); });
  const label = document.getElementById("segLabel");
  if (idx === STEPS.length) label.innerHTML = `${stepSVG("review",15,"#7ec8e3")} <span>${tx(STEP_REVIEW_SHORT)} · ${tx(T.stepOf)(total,total)}</span>`;
  else label.innerHTML = `${stepSVG(STEP_ICON[idx],15,STEP_COLOR[idx])} <span>${tx(STEP_SHORT[idx])} · ${tx(T.stepOf)(idx+1,total)}</span>`;
}

function renderStep(step){
  const d = document.createElement("div");
  d.className = "step active";
  let html = `<div class="intro"><div class="av" style="background:${STEP_COLOR[idx]}">${stepSVG(STEP_ICON[idx],24,"#fff")}</div><div><h2>${tx(step.title)}</h2><p>${tx(step.intro)}</p></div></div>`;
  step.fields.forEach(f=>{ html += fieldHTML(f); });
  html += `<div class="nav">
      <button class="btn ghost" id="backBtn">${tx(T.back)}</button>
      <button class="btn primary" id="nextBtn">${idx===STEPS.length-1?tx(T.review):tx(T.next)}</button>
    </div>
    <div class="saved" id="savedline">💾 ${tx(T.autosave)}</div>`;
  d.innerHTML = html;
  stage.appendChild(d);
  wireFields(step);
  document.getElementById("backBtn").onclick = ()=>{ idx--; persist(); render(); };
  document.getElementById("nextBtn").onclick = ()=>{ idx++; persist(); render(); };
}

function fieldHTML(f){
  const optTag = f.optional ? `<span class="opt">${lang==="es"?"opcional":"optional"}</span>` : "";
  const hint = f.hint ? `<div class="hint">${tx(f.hint)}</div>` : "";
  const hide = (f.showIf && !showIfMet(f)) ? `style="display:none"` : "";
  let inner = "";
  if (["text","tel","email","date"].includes(f.type)){
    inner = `<input type="${f.type}" data-key="${f.key}" value="${esc(data[f.key]||"")}" placeholder="${tx(f.ph)||""}">`;
  } else if (f.type==="textarea"){
    inner = `<textarea data-key="${f.key}" placeholder="${tx(f.ph)||""}">${esc(data[f.key]||"")}</textarea>`;
  } else if (f.type==="chips"){
    const sel = toArr(data[f.key]);
    const optVals = f.options.map(o=>o.v);
    let chipsHtml = f.options.map(o=>`<div class="chip ${o.none?"none":""} ${sel.includes(o.v)?"on":""}" data-v="${esc(o.v)}" data-none="${o.none?1:0}">${o[lang]??o.en}</div>`).join("");
    if (f.addOther){
      const customs = sel.filter(v=>!optVals.includes(v));
      chipsHtml += customs.map(v=>`<div class="chip custom" data-v="${esc(v)}" data-custom="1">${esc(v)} <span class="cx">✕</span></div>`).join("");
    }
    inner = `<div class="chips" data-key="${f.key}" data-single="${f.single?1:0}">${chipsHtml}</div>`;
    if (f.addOther){
      inner += `<div class="addother"><input type="text" class="addother-inp" data-addother="${f.key}" placeholder="${tx(T.addOtherPh)}">`+
               `<button type="button" class="addother-btn" data-addotherbtn="${f.key}">${tx(T.add)}</button></div>`;
    }
  } else if (f.type==="dropdown"){
    const sel = toArr(data[f.key]);
    const optVals = f.options.map(o=>o.v);
    const summary = sel.length ? sel.join(", ") : (lang==="es"?"Seleccione…":"Select…");
    let rows = f.options.map(o=>`<label class="dd-opt"><input type="checkbox" data-ddv="${esc(o.v)}" ${sel.includes(o.v)?"checked":""}><span>${o[lang]??o.en}</span></label>`).join("");
    if (f.addOther){
      const customs = sel.filter(v=>!optVals.includes(v));
      rows += customs.map(v=>`<label class="dd-opt"><input type="checkbox" data-ddv="${esc(v)}" data-custom="1" checked><span>${esc(v)} <span class="cx">(${lang==="es"?"propio":"yours"})</span></span></label>`).join("");
    }
    const addo = f.addOther ? `<div class="addother"><input type="text" class="addother-inp" data-addother="${f.key}" placeholder="${tx(T.addOtherPh)}"><button type="button" class="addother-btn" data-addotherbtn="${f.key}">${tx(T.add)}</button></div>` : "";
    inner = `<div class="dropdown" data-key="${f.key}">`+
      `<button type="button" class="dd-head" data-ddhead="${f.key}"><span class="dd-summary ${sel.length?"":"ph"}">${esc(summary)}</span><span class="dd-caret">▾</span></button>`+
      `<div class="dd-panel" data-ddpanel="${f.key}" hidden>${rows}${addo}</div></div>`;
  } else if (f.type==="select"){
    const cur = (toArr(data[f.key])[0])||"";
    inner = `<select data-selectkey="${f.key}"><option value="">${lang==="es"?"Seleccione…":"Select…"}</option>`+
      f.options.map(o=>`<option value="${esc(o.v)}" ${cur===o.v?"selected":""}>${o[lang]??o.en}</option>`).join("")+`</select>`;
  } else if (f.type==="engrave"){
    inner = engraveHTML(f);
  } else if (f.type==="repeat"){
    let picker = "";
    if (f.repeatKind==="med"){
      picker = `<select class="medpicker" data-medpicker="${f.key}"><option value="">${lang==="es"?"➕ Agregar un medicamento común…":"➕ Add a common medication…"}</option>`+
        MED_LIST.map(m=>`<option value="${esc(m.name)}">${esc(m.name)} — ${esc(m.dose)}</option>`).join("")+`</select>`;
    }
    inner = picker + `<div class="repeat" data-key="${f.key}" data-kind="${f.repeatKind}"></div>`+
      `<button type="button" class="addbtn" data-add="${f.key}">${f.repeatKind==="med"?tx(T.addMed):tx(T.addContact)}</button>`;
  }
  const labelFor = ["chips","repeat","dropdown","engrave"].includes(f.type) ? "div" : "label";
  return `<div class="field" data-fieldkey="${f.key}" ${hide}>
      <${labelFor}>${tx(f.label)} ${optTag}</${labelFor}>${hint}${inner}</div>`;
}

/* ── Medic Alert engraving: auto-filled from earlier answers ── */
function engraveAuto(k){
  if(k==="name") return (data.preferred_name||data.legal_name||"").trim();
  if(k==="diagnosis") return toArr(data.diagnoses).join(", ");
  if(k==="allergies") return allergiesSummary();
  return "";
}
function allergiesSummary(){
  const a=toArr(data.allergies);
  if(a.includes("None")) return (lang==="es"?"Ninguna":"None");
  if(a.includes("Yes")) return (data.allergies_list||"").trim() || (lang==="es"?"Sí":"Yes");
  return "";
}
function engraveChecked(key){ return Array.isArray(data[key]) ? data[key] : ["name","diagnosis","allergies"]; }
function engraveHTML(f){
  const checked = engraveChecked(f.key);
  const phone = data.medic_alert_phone||"";
  const items=[
    ["name", lang==="es"?"Nombre":"Name", engraveAuto("name")],
    ["diagnosis", lang==="es"?"Diagnóstico":"Diagnosis", engraveAuto("diagnosis")],
    ["allergies", lang==="es"?"Alergias":"Allergies", engraveAuto("allergies")],
  ];
  const rows = items.map(([k,lbl,val])=>`<label class="eng-row"><input type="checkbox" data-engk="${k}" ${checked.includes(k)?"checked":""}>`+
    `<span class="eng-lbl">${lbl}</span><span class="eng-val ${val?"":"empty"}">${val?esc(val):(lang==="es"?"(en blanco)":"(blank)")}</span></label>`).join("");
  const phoneRow = `<div class="eng-row phone"><span class="eng-lbl">${lang==="es"?"Tel. emergencia":"Emergency phone"}</span>`+
    `<input type="tel" data-engphone="1" value="${esc(phone)}" placeholder="(000) 000-0000"></div>`;
  return `<div class="engrave" data-key="${f.key}">${rows}${phoneRow}</div>`;
}

function wireFields(step){
  step.fields.forEach(f=>{
    const node=stage.querySelector(`.field[data-fieldkey="${f.key}"]`);
    if(node) wireOneField(step,f,node);
  });
}

function wireOneField(step,f,node){
  // text / textarea / tel / email / date
  node.querySelectorAll("input[data-key],textarea[data-key]").forEach(el=>{
    el.addEventListener("input", ()=>{ data[el.dataset.key]=el.value; persist(true); applyShowIf(step); });
  });
  // chips
  const box=node.querySelector(".chips[data-key]");
  if(box){
    const key=box.dataset.key, single=box.dataset.single==="1";
    box.querySelectorAll(".chip").forEach(chip=>{
      chip.onclick=()=>{
        let sel=toArr(data[key]); const v=chip.dataset.v, isNone=chip.dataset.none==="1", isCustom=chip.dataset.custom==="1";
        if(isCustom){ sel=sel.filter(x=>x!==v); data[key]=sel; persist(); rerenderField(step,key); applyShowIf(step); return; }
        if(single){ sel=[v]; }
        else if(isNone){ sel=sel.includes(v)?[]:[v]; }      // "None" clears others
        else { sel=sel.filter(x=>!isNoneVal(box,x)); sel = sel.includes(v)?sel.filter(x=>x!==v):[...sel,v]; }
        data[key]=sel; persist(true);
        box.querySelectorAll(".chip:not(.custom)").forEach(c=>c.classList.toggle("on",sel.includes(c.dataset.v)));
        applyShowIf(step);
      };
    });
    // add-your-own
    const inp=node.querySelector(`[data-addother="${key}"]`);
    const addBtn=node.querySelector(`[data-addotherbtn="${key}"]`);
    if(inp && addBtn){
      const doAdd=()=>{ const val=(inp.value||"").trim(); if(!val) return;
        let sel=toArr(data[key]).filter(x=>!isNoneVal(box,x));  // adding a real value clears "None"
        if(!sel.some(x=>x.toLowerCase()===val.toLowerCase())) sel.push(val);
        data[key]=sel; inp.value=""; persist(); rerenderField(step,key); applyShowIf(step);
        const ni=stage.querySelector(`[data-addother="${key}"]`); if(ni) ni.focus();
      };
      addBtn.onclick=doAdd;
      inp.addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); doAdd(); } });
    }
  }
  // multi-select dropdown (checklist)
  const dd=node.querySelector(".dropdown[data-key]");
  if(dd){
    const key=dd.dataset.key;
    const head=dd.querySelector(".dd-head"), panel=dd.querySelector(".dd-panel");
    head.onclick=(e)=>{ e.stopPropagation(); const isOpen=!panel.hasAttribute("hidden"); closeAllDropdowns(); if(!isOpen) openDropdown(key); };
    panel.addEventListener("click",e=>e.stopPropagation());
    panel.querySelectorAll('input[type="checkbox"][data-ddv]').forEach(cb=>{
      cb.onchange=()=>{ let sel=toArr(data[key]); const v=cb.dataset.ddv, isCustom=cb.dataset.custom==="1";
        if(cb.checked){ if(!sel.includes(v)) sel.push(v); } else { sel=sel.filter(x=>x!==v); }
        data[key]=sel; persist();
        if(isCustom && !cb.checked){ rerenderField(step,key); openDropdown(key); } else { updateDropdownSummary(dd,key); }
        applyShowIf(step);
      };
    });
    const inp=dd.querySelector(`[data-addother="${key}"]`), addBtn=dd.querySelector(`[data-addotherbtn="${key}"]`);
    if(inp && addBtn){
      const doAdd=()=>{ const val=(inp.value||"").trim(); if(!val) return;
        let sel=toArr(data[key]); if(!sel.some(x=>x.toLowerCase()===val.toLowerCase())) sel.push(val);
        data[key]=sel; inp.value=""; persist(); rerenderField(step,key); openDropdown(key);
        const ni=stage.querySelector(`[data-addother="${key}"]`); if(ni) ni.focus(); applyShowIf(step); };
      addBtn.onclick=(e)=>{ e.stopPropagation(); doAdd(); };
      inp.addEventListener("click",e=>e.stopPropagation());
      inp.addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); e.stopPropagation(); doAdd(); } });
    }
  }
  // single-select dropdown
  const selEl=node.querySelector("select[data-selectkey]");
  if(selEl){ selEl.onchange=()=>{ data[selEl.dataset.selectkey]=selEl.value; persist(); applyShowIf(step); }; }
  // Medic Alert engraving
  const eng=node.querySelector(".engrave[data-key]");
  if(eng){
    const key=eng.dataset.key;
    if(!Array.isArray(data[key])) data[key]=["name","diagnosis","allergies"];  // default-checked
    eng.querySelectorAll('input[type="checkbox"][data-engk]').forEach(cb=>{
      cb.onchange=()=>{ let sel=Array.isArray(data[key])?data[key].slice():[]; const k=cb.dataset.engk;
        if(cb.checked){ if(!sel.includes(k)) sel.push(k); } else { sel=sel.filter(x=>x!==k); }
        data[key]=sel; persist(); };
    });
    const ph=eng.querySelector("[data-engphone]");
    if(ph) ph.addEventListener("input",()=>{ data.medic_alert_phone=ph.value; persist(true); });
  }
  // repeat rows
  const rep=node.querySelector(".repeat");
  if(rep){
    renderRepeat(rep);
    const addb=node.querySelector("[data-add]");
    if(addb) addb.onclick=()=>{ const key=addb.dataset.add; const arr=Array.isArray(data[key])?data[key]:[];
      arr.push({}); data[key]=arr; persist(); renderRepeat(stage.querySelector(`.repeat[data-key="${key}"]`)); };
    const mp=node.querySelector("select[data-medpicker]");
    if(mp) mp.onchange=()=>{ const name=mp.value; if(!name) return; const key=mp.dataset.medpicker;
      const arr=Array.isArray(data[key])?data[key]:[]; arr.push({name, dose:MED_BY_NAME[name.toLowerCase()]||""});
      data[key]=arr; mp.value=""; persist(); renderRepeat(stage.querySelector(`.repeat[data-key="${key}"]`)); };
  }
}

function updateDropdownSummary(dd,key){
  const sel=toArr(data[key]); const s=dd.querySelector(".dd-summary");
  if(sel.length){ s.textContent=sel.join(", "); s.classList.remove("ph"); }
  else { s.textContent=(lang==="es"?"Seleccione…":"Select…"); s.classList.add("ph"); }
}
function openDropdown(key){
  const p=stage.querySelector(`[data-ddpanel="${key}"]`); if(p) p.removeAttribute("hidden");
  const h=stage.querySelector(`[data-ddhead="${key}"]`); if(h) h.classList.add("open");
}
function closeAllDropdowns(){
  stage.querySelectorAll(".dd-panel").forEach(p=>p.setAttribute("hidden",""));
  stage.querySelectorAll(".dd-head").forEach(h=>h.classList.remove("open"));
}

function rerenderField(step,key){
  const f=step.fields.find(x=>x.key===key); if(!f) return;
  const old=stage.querySelector(`.field[data-fieldkey="${key}"]`); if(!old) return;
  const tmp=document.createElement("div"); tmp.innerHTML=fieldHTML(f);
  const fresh=tmp.firstElementChild; old.replaceWith(fresh); wireOneField(step,f,fresh);
}

function isNoneVal(box,v){
  const c=box.querySelector(`.chip[data-v="${CSS.escape(v)}"]`); return c && c.dataset.none==="1";
}

function renderRepeat(box){
  const key=box.dataset.key, kind=box.dataset.kind;
  const arr=Array.isArray(data[key])?data[key]:[];
  box.innerHTML="";
  arr.forEach((row,i)=>{
    const r=document.createElement("div"); r.className="rrow";
    if(kind==="med"){
      r.innerHTML=`<input placeholder="${tx(T.medName)}" value="${esc(row.name||"")}" data-f="name" list="medlist" autocomplete="off">
                   <input placeholder="${tx(T.medDose)}" value="${esc(row.dose||"")}" data-f="dose">
                   <button class="del" title="Remove">✕</button>`;
    } else {
      r.innerHTML=`<input placeholder="${tx(T.cName)}" value="${esc(row.name||"")}" data-f="name">
                   <input placeholder="${tx(T.cRel)}" value="${esc(row.rel||"")}" data-f="rel" style="max-width:120px">
                   <input placeholder="${tx(T.cPhone)}" value="${esc(row.phone||"")}" data-f="phone" style="max-width:130px">
                   <button class="del" title="Remove">✕</button>`;
    }
    r.querySelectorAll("input").forEach(inp=>inp.addEventListener("input",()=>{
      arr[i][inp.dataset.f]=inp.value;
      if(kind==="med" && inp.dataset.f==="name"){
        const dose=MED_BY_NAME[(inp.value||"").trim().toLowerCase()];
        if(dose && !(arr[i].dose||"").trim()){ arr[i].dose=dose; const di=r.querySelector('[data-f="dose"]'); if(di) di.value=dose; }
      }
      data[key]=arr; persist(true);
    }));
    r.querySelector(".del").onclick=()=>{ arr.splice(i,1); data[key]=arr; persist(); renderRepeat(box); };
    box.appendChild(r);
  });
}

function showIfMet(f){
  if(!f.showIf) return true;
  const cur=toArr(data[f.showIf[0]]);
  const want=Array.isArray(f.showIf[1])?f.showIf[1]:[f.showIf[1]];
  return cur.some(v=>want.includes(v));
}
function applyShowIf(step){
  step.fields.forEach(f=>{
    if(!f.showIf) return;
    const el=stage.querySelector(`.field[data-fieldkey="${f.key}"]`);
    if(el) el.style.display = showIfMet(f) ? "" : "none";
  });
}

/* ── Review ── */
function renderReview(){
  const d=document.createElement("div"); d.className="step active";
  let html=`<div class="intro"><div class="av">📑</div><div>
      <h2>${lang==="es"?"Revise sus respuestas":"Review your answers"}</h2>
      <p>${lang==="es"?"Verifique todo y presione Enviar. Puede editar cualquier sección.":"Check everything, then press Send. You can edit any section."}</p></div></div>`;
  STEPS.forEach((step,si)=>{
    const items=step.fields.map(f=>{
      const val=displayVal(f);
      return `<div class="rev-item"><div class="k">${tx(f.label)}</div><div class="v ${val?"":"empty"}">${val?esc(val):tx(T.blank)}</div></div>`;
    }).join("");
    html+=`<div class="rev-sec"><div class="rev-head"><span class="rev-ic">${stepSVG(STEP_ICON[si],17,STEP_COLOR[si])} ${tx(step.title)}</span>
        <button class="edit" data-go="${si}">✎ ${tx(T.edit)}</button></div>
        <div class="rev-body">${items}</div></div>`;
  });
  html+=`<div class="nav" style="margin-top:20px">
      <button class="btn ghost" id="backBtn">${tx(T.back)}</button>
      <button class="btn primary" id="sendBtn">${tx(T.send)}</button></div>
    <div class="err" id="sendErr"></div>
    <div class="fallback" id="fallback">
      <h3>${lang==="es"?"Envíe sus respuestas a su coordinador":"Send your answers to your coordinator"}</h3>
      <p>${lang==="es"?"Copie el resumen o ábralo en su correo y envíelo a su coordinador.":"Copy the summary or open it in your email and send it to your coordinator."}</p>
      <textarea id="fallbackText" readonly></textarea>
      <div class="fbtns">
        <button class="btn blue" id="copyBtn">📋 ${lang==="es"?"Copiar":"Copy"}</button>
        <button class="btn gmail" id="gmailBtn">✉️ ${lang==="es"?"Abrir en Gmail":"Open in Gmail"}</button>
        <button class="btn primary" id="emailBtn">📧 ${lang==="es"?"App de correo":"Email app"}</button>
      </div>
    </div>`;
  d.innerHTML=html; stage.appendChild(d);
  d.querySelector("#backBtn").onclick=()=>{ idx--; persist(); render(); };
  d.querySelectorAll(".edit").forEach(b=>b.onclick=()=>{ idx=+b.dataset.go; persist(); render(); });
  d.querySelector("#sendBtn").onclick=submit;
}

function renderDone(){
  const d=document.createElement("div"); d.className="step active done";
  const name=window.VMRC_CONFIG.coordinatorName||"your coordinator";
  d.innerHTML=`<div class="check">✓</div>
    <h1>${lang==="es"?"¡Gracias!":"Thank you!"}</h1>
    <p>${lang==="es"
      ? `Sus respuestas fueron enviadas a ${name}. Las usará para prepararse para su reunión del IPP. Se pondrá en contacto si necesita algo más.`
      : `Your answers were sent to ${name}. They'll use them to prepare for your IPP meeting and will reach out if anything else is needed.`}</p>
    <p style="margin-top:14px">${lang==="es"?"Ya puede cerrar esta página.":"You can now close this page."}</p>`;
  stage.appendChild(d);
}

/* ═══════════════════════════════════════════════════════════════════
   4) SUBMIT — Apps Script if available, else copy/email fallback
   ═══════════════════════════════════════════════════════════════════ */
function buildPayload(){
  const answers={};
  const SKIP=["legal_name","preferred_name","uci","dob"];  // captured at top level; avoid duplicate Sheet columns
  STEPS.forEach(s=>s.fields.forEach(f=>{ if(!SKIP.includes(f.key)) answers[f.key]=displayVal(f); }));
  return {
    submittedAt: new Date().toISOString(),
    lang,
    legal_name: data.legal_name||"",
    preferred_name: data.preferred_name||"",
    uci: data.uci||"",
    dob: fmtDate(data.dob),
    answers,
    raw: data
  };
}

function submit(){
  const btn=document.getElementById("sendBtn"); const err=document.getElementById("sendErr");
  err.style.display="none";
  if(!(data.legal_name||"").trim()){
    err.textContent = lang==="es"?"Por favor ingrese el nombre de la persona (paso 1).":"Please enter the person's name (step 1).";
    err.style.display="block"; idx=0; setTimeout(()=>{persist();render();},900); return;
  }
  btn.disabled=true; btn.textContent = lang==="es"?"Enviando…":"Sending…";
  const payload=buildPayload();

  // Path 1: served by Apps Script
  if (window.google && google.script && google.script.run){
    google.script.run
      .withSuccessHandler(()=>{ clearDraft(); idx=STEPS.length+1; render(); })
      .withFailureHandler(()=>{ showFallback(payload); btn.disabled=false; btn.textContent=tx(T.send); })
      .submitIntake(payload);
    return;
  }
  // Path 2: hosted elsewhere (e.g. GitHub Pages) → POST to Apps Script.
  // Apps Script can't send CORS headers cross-origin, so use no-cors: the POST
  // still reaches doPost and saves to the Sheet; we can't read the reply, so we
  // optimistically show the thank-you once the request goes out.
  const url = window.VMRC_CONFIG.webAppUrl;
  if (url){
    fetch(url,{method:"POST",mode:"no-cors",body:JSON.stringify(payload)})
      .then(()=>{ clearDraft(); idx=STEPS.length+1; render(); })
      .catch(()=>{ showFallback(payload); btn.disabled=false; btn.textContent=tx(T.send); });
    return;
  }
  // Path 3: standalone — copy / email fallback (the backup)
  showFallback(payload); btn.disabled=false; btn.textContent=tx(T.send);
}

function summaryText(p){
  let s = `VMRC PRE-MEETING INTAKE\n${"=".repeat(28)}\n`;
  s += `Name: ${p.legal_name}${p.preferred_name?` ("${p.preferred_name}")`:""}\n`;
  if(p.uci) s+=`UCI: ${p.uci}\n`;
  if(p.dob) s+=`DOB: ${p.dob}\n`;
  s += `Submitted: ${new Date(p.submittedAt).toLocaleString()}\n`;
  STEPS.forEach(step=>{
    const lines=step.fields.map(f=>{ const v=p.answers[f.key]; return v?`  • ${tx(f.label)}: ${v}`:null; }).filter(Boolean);
    if(lines.length){ s+=`\n${step.icon} ${tx(step.title).toUpperCase()}\n${lines.join("\n")}\n`; }
  });
  return s;
}

function showFallback(p){
  const fb=document.getElementById("fallback"); fb.style.display="block";
  const text=summaryText(p);
  document.getElementById("fallbackText").value=text;
  document.getElementById("copyBtn").onclick=()=>{ navigator.clipboard.writeText(text).then(()=>{
    document.getElementById("copyBtn").textContent="✓ "+(lang==="es"?"Copiado":"Copied"); }); };
  const email=window.VMRC_CONFIG.coordinatorEmail||"";
  const subj=encodeURIComponent(`VMRC Intake — ${p.legal_name||""}`);
  const body=encodeURIComponent(text);
  // Gmail web compose — pre-fills To/Subject/Body in a Gmail tab, no default mail app needed
  document.getElementById("gmailBtn").onclick=()=>{
    window.open(`https://mail.google.com/mail/?view=cm&fs=1&to=${encodeURIComponent(email)}&su=${subj}&body=${body}`,"_blank");
  };
  // mailto — hands off to the device's default mail app (works on phones)
  document.getElementById("emailBtn").onclick=()=>{ window.location.href=`mailto:${email}?subject=${subj}&body=${body}`; };
  fb.scrollIntoView({behavior:"smooth"});
}

/* ═══════════════════════════════════════════════════════════════════
   5) Values, persistence, utils
   ═══════════════════════════════════════════════════════════════════ */
function fmtDate(v){
  if(!v) return "";
  const m=String(v).match(/^(\d{4})-(\d{2})-(\d{2})$/);   // native date input → MM/DD/YYYY
  return m ? `${m[2]}/${m[3]}/${m[1]}` : String(v);
}
function displayVal(f){
  const v=data[f.key];
  if(f.type==="date") return fmtDate(v);
  if(f.type==="chips"||f.type==="dropdown"){ const a=toArr(v); return a.join(", "); }
  if(f.type==="select"){ return (toArr(v)[0]||"").toString().trim(); }
  if(f.type==="engrave"){
    const checked=engraveChecked(f.key); const parts=[];
    if(checked.includes("name")){ const x=engraveAuto("name"); if(x) parts.push("Name: "+x); }
    if(checked.includes("diagnosis")){ const x=engraveAuto("diagnosis"); if(x) parts.push("Diagnosis: "+x); }
    if(checked.includes("allergies")){ const x=engraveAuto("allergies"); if(x) parts.push("Allergies: "+x); }
    const phone=(data.medic_alert_phone||"").trim(); if(phone) parts.push("Emergency phone: "+phone);
    return parts.join("; ");
  }
  if(f.type==="repeat"){
    const arr=Array.isArray(v)?v:[];
    if(f.repeatKind==="med") return arr.filter(r=>r.name).map(r=>`${r.name}${r.dose?` — ${r.dose}`:""}`).join("\n");
    return arr.filter(r=>r.name).map(r=>`${r.name}${r.rel?` (${r.rel})`:""}${r.phone?` — ${r.phone}`:""}`).join("\n");
  }
  return (v||"").toString().trim();
}
function toArr(v){ return Array.isArray(v)?v:(v?[v]:[]); }
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function hasDraft(){ return Object.keys(data).some(k=>k!=="__step"&&data[k]&&(Array.isArray(data[k])?data[k].length:true)); }
function firstUnansweredStep(){ return 0; }

let saveT;
function persist(light){
  data.__step=idx;
  clearTimeout(saveT);
  saveT=setTimeout(()=>LS.set(SAVE_KEY,JSON.stringify(data)), light?350:0);
}
function clearDraft(){ LS.remove(SAVE_KEY); }

/* ── Lang + theme ── */
function setLang(l){ lang=l; LS.set(SAVE_KEY+"_lang",l); document.documentElement.lang=l;
  document.getElementById("langBtn").textContent = l==="en"?"🌐 ES":"🌐 EN"; render(); }
document.getElementById("langBtn").onclick=()=>setLang(lang==="en"?"es":"en");

function setTheme(t){ document.documentElement.setAttribute("data-theme",t); LS.set(SAVE_KEY+"_theme",t);
  document.getElementById("themeBtn").textContent = t==="dark"?"☀️":"🌙"; }
document.getElementById("themeBtn").onclick=()=>setTheme(document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark");
setTheme(LS.get(SAVE_KEY+"_theme")|| (matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light"));
document.getElementById("langBtn").textContent = lang==="en"?"🌐 ES":"🌐 EN";

// medication autocomplete source
(function(){ const dl=document.createElement("datalist"); dl.id="medlist";
  MED_LIST.forEach(m=>{ const o=document.createElement("option"); o.value=m.name; dl.appendChild(o); });
  document.body.appendChild(dl);
})();

// close any open dropdown when tapping elsewhere
document.addEventListener("click",()=>closeAllDropdowns());

try { render(); }
catch(err){
  try { document.getElementById("stage").innerHTML =
    '<div style="margin:18px;padding:16px;border:2px solid #c0392b;border-radius:12px;'
    + 'background:#fdecea;color:#7a1f17;font:13px/1.55 ui-monospace,Consolas,monospace;white-space:pre-wrap">'
    + '⚠️ render() error (build 3):\n\n' + (err && err.message) + '\n\n' + ((err && err.stack)||'')
    + '\n\nScreenshot this and send it to your coordinator.</div>'; } catch(_){}
}
