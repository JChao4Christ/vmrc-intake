<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VMRC — Getting Ready for Your Meeting</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
<!-- ════════════════════════════════════════════════════════════════
     VMRC FAMILY PRE-SCREENING INTAKE  ·  A+C blend (guided + warm)
     • Works standalone (preview / offline backup: copy + email).
     • When served by Google Apps Script, auto-saves to your Sheet.
     CONFIG below is also overridden by Apps Script (see Code.gs).
     ════════════════════════════════════════════════════════════════ -->
<script>
  /* ▼▼▼  EDIT THESE LINES (used for the email/print fallback & trust line)  ▼▼▼ */
  window.VMRC_CONFIG = {

    coordinatorEmail: "jchao@vmrc.net",  /* recipient for the email/Gmail fallback */
    coordinatorPhone: "(209) 955-3293",  /* shown on the welcome screen's "prefer to call?" line */
    familyReceipt: false,                /* MUST stay false while cloud submission is disabled (no backend = no receipt email; true would promise families a confirmation that never arrives) */
    /* Microsoft Bookings link (recommended by VMRC IT) — paste your Bookings page
       URL here and the thank-you screen shows a "Pick a meeting time" button so
       families can schedule the IPP meeting themselves. Leave "" to hide it. */
    bookingUrl: "https://outlook.office.com/bookwithme/user/312c48775e294c209d9000acf8d3eb93@vmrc.net/meetingtype/H75kRGLC8EmQUjPeyDUFnQ2?anonymous&ismsaljsauthenabled&ep=email",
    /* Light anti-spam: this must match CONFIG.TOKEN in Code.gs. (It's visible in
       the page source, so it only deters dumb bots — the honeypot is the real filter.) */
    token: "vmrc-intake-7Qk2",
    /* CLOUD SUBMISSION DISABLED (privacy). The form does NOT POST anywhere; families
       hand their answers to the coordinator locally (copy / email / download). Leave
       this empty. (Old Apps Script /exec target removed on 2026-06-04.) */

  /* ▲▲▲  Everything else is automatic.  ▲▲▲ */
</script>
<style>
  :root{
    /* ── Monochrome system, matched to the VMRC IPP SC Toolkit ── */
    --topbar:#0c0d10; --topbar-tx:#f4f5f7;
    --accent:#111114; --accent-2:#26272b; --on-accent:#ffffff; --accent-soft:#f0f0f2;
    --bg:#f5f5f6; --card:#ffffff; --ink:#0c0d10; --muted:#52555c;
    --line:#e6e6e9; --field:#ffffff; --fieldline:#dcdce0;
    --chip:#f0f0f2; --chipline:#e6e6e9; --chipink:#111114;
    --shadow:0 1px 2px rgba(11,12,15,.05),0 10px 34px rgba(11,12,15,.09);
    --bub:#ffffff; --good:#16a34a;
    /* legacy names mapped onto the system above so existing rules keep working */
    --navy:var(--topbar); --navy-d:#070809; --navy-dd:#000000;
    --cyan:#e8eaee; --green:var(--accent); --green-d:var(--accent-2); --amber:#c2710c;
  }
  [data-theme="dark"]{
    --topbar:#000000; --topbar-tx:#f4f5f7;
    --accent:#f4f5f7; --accent-2:#d4d6da; --on-accent:#0a0b0d; --accent-soft:#1f2227;
    --bg:#0a0b0d; --card:#141518; --ink:#f4f5f7; --muted:#aeb2bb;
    --line:#262931; --field:#1a1c20; --fieldline:#2a2d34;
    --chip:#1f2227; --chipline:#2a2d34; --chipink:#e8eaee;
    --shadow:0 1px 2px rgba(0,0,0,.5),0 12px 34px rgba(0,0,0,.5);
    --bub:#141518; --good:#34d399;
    --navy:#000000; --navy-d:#070809; --navy-dd:#000000;
    --cyan:#e8eaee; --green:var(--accent); --green-d:var(--accent-2); --amber:#fbbf24;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.5;
    display:flex; flex-direction:column; min-height:100%;
    transition:background .3s,color .3s;
  }

  /* ── Top bar ── */
  .bar{
    background:linear-gradient(135deg,var(--navy),var(--navy-d));
    color:#fff; padding:13px 16px; position:sticky; top:0; z-index:30;
    box-shadow:0 2px 14px rgba(0,0,0,.28);
  }
  .bar-row{display:flex;align-items:center;gap:10px;max-width:640px;margin:0 auto}
  .bar .org{font-size:10px;letter-spacing:.12em;color:var(--cyan);font-weight:800;text-transform:uppercase}
  .bar .ttl{font-size:15.5px;font-weight:800;line-height:1.15}
  .bar .spacer{flex:1}

  /* centered VMRC brand block: logo + title together (scrolls away; navy bar stays sticky) */
  .brand{background:#fff;text-align:center;padding:16px 16px 14px;border-bottom:1px solid #e1e8f0}
  .vlogo{height:120px;width:auto;display:inline-block}
  .bar-title{font-size:15px;font-weight:800;color:#fff;line-height:1.15}
  .iconbtn{
    background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.26);color:#fff;
    border-radius:30px;padding:6px 12px;font-size:12.5px;font-weight:700;cursor:pointer;
    display:flex;align-items:center;gap:6px;white-space:nowrap;transition:.15s;
  }
  .iconbtn:hover{background:rgba(255,255,255,.22)}
  /* progress */
  .progwrap{max-width:640px;margin:9px auto 0}
  .prog{height:7px;background:rgba(255,255,255,.22);border-radius:5px;overflow:hidden}
  .prog>i{display:block;height:100%;width:0;background:var(--cyan);border-radius:5px;transition:width .35s}
  .progtxt{font-size:11px;color:var(--cyan);margin-top:4px;font-weight:600}
  /* segmented step bar — click anywhere along it to jump to that step */
  .segwrap{max-width:640px;margin:10px auto 0}
  .segbar{display:flex;gap:3px}
  .segbar .seg{flex:1;min-width:0;height:32px;border:none;background:rgba(255,255,255,.14);
    color:rgba(255,255,255,.72);border-radius:6px;font-size:12.5px;font-weight:800;cursor:pointer;
    display:flex;align-items:center;justify-content:center;font-family:inherit;padding:0;transition:.15s}
  .segbar .seg:hover{background:rgba(255,255,255,.30);color:#fff}
  .segbar .seg.done{background:rgba(255,255,255,.42);color:#0c0d10}
  .segbar .seg.active{background:#ffffff;color:#0c0d10;box-shadow:0 0 0 2px rgba(255,255,255,.6)}
  .seglabel{display:flex;align-items:center;justify-content:center;gap:6px;font-size:12px;color:var(--cyan);font-weight:700;margin-top:7px}
  .pbar{height:6px;background:rgba(255,255,255,.16);border-radius:99px;overflow:hidden;margin-top:9px}
  .pbar>i{display:block;height:100%;width:0;background:var(--cyan);border-radius:99px;transition:width .35s ease}
  .savedpill{display:flex;justify-content:center;font-size:11.5px;color:var(--cyan);font-weight:700;margin-top:6px;opacity:0;transform:translateY(-2px);transition:opacity .2s,transform .2s;pointer-events:none}
  .savedpill.show{opacity:1;transform:none}
  .iconbtn.on{background:rgba(255,255,255,.30)}
  html.big body{zoom:1.18}
  html.big .chip{padding:12px 22px}
  html.big .hint{font-weight:600}
  html.big input,html.big textarea,html.big select{border-width:2px}

  /* ── Stage ── */
  main{flex:1;width:100%;max-width:640px;margin:0 auto;padding:18px 16px 26px}
  .step{display:none;animation:fade .35s ease}
  .step.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  .intro{
    display:flex;gap:11px;align-items:flex-start;background:var(--bub);
    border:1px solid var(--line);border-left:4px solid var(--accent);
    border-radius:14px;border-top-left-radius:5px;padding:13px 15px;margin-bottom:6px;
    box-shadow:0 2px 10px rgba(20,40,70,.05);
  }
  .intro .av{flex:none;width:38px;height:38px;border-radius:50%;background:var(--navy);color:#fff;
    display:flex;align-items:center;justify-content:center;box-shadow:0 3px 9px rgba(20,40,70,.18)}
  .intro .av svg{display:block}
  .rev-ic{display:inline-flex;align-items:center;gap:7px}
  .ic{flex:none}
  .intro h2{font-size:17px;margin-bottom:2px}
  .intro p{font-size:13.5px;color:var(--muted)}

  .field{margin-top:16px}
  .field > label{display:block;font-weight:700;font-size:14.5px;margin-bottom:6px}
  .field .hint{font-size:12.5px;color:var(--muted);font-weight:400;margin-top:-3px;margin-bottom:7px}
  .opt{font-size:11.5px;color:var(--muted);font-weight:600;background:var(--chip);border:1px solid var(--chipline);
       border-radius:10px;padding:1px 7px;margin-left:6px;vertical-align:middle}
  input[type=text],input[type=tel],input[type=email],input[type=date],textarea,select{
    width:100%;background:var(--field);color:var(--ink);
    border:1.5px solid var(--fieldline);border-radius:11px;
    padding:12px 13px;font-size:15px;font-family:inherit;transition:.15s;
  }
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(17,17,20,.12)}
  textarea{min-height:78px;resize:vertical;line-height:1.45}
  ::placeholder{color:var(--muted);opacity:.7}

  /* chips */
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{
    background:var(--chip);border:1.5px solid var(--chipline);color:var(--chipink);
    border-radius:22px;padding:9px 15px;font-size:14px;font-weight:600;cursor:pointer;
    transition:.12s;user-select:none;display:flex;align-items:center;gap:6px;
  }
  .chip:hover{transform:translateY(-1px)}
  .chip.on{background:var(--green);border-color:var(--green);color:var(--on-accent)}
  .chip.on::before{content:"✓";font-weight:900}
  .chip.none.on{background:var(--accent);border-color:var(--accent)}

  /* repeat rows (meds / contacts) */
  .repeat{margin-top:6px}
  .rrow{display:flex;gap:8px;margin-top:8px;align-items:center;flex-wrap:wrap}
  .rrow input{flex:1 1 120px;min-width:0}
  .rrow .del{flex:none;width:44px;height:44px;border-radius:10px;border:none;
    background:#fdecea;color:#c0392b;font-size:20px;font-weight:800;line-height:1;cursor:pointer;transition:.12s}
  .rrow .del:hover{background:#c0392b;color:#fff}
  [data-theme="dark"] .rrow .del{background:#3a2226;color:#ff8a80}
  [data-theme="dark"] .rrow .del:hover{background:#c0392b;color:#fff}
  .addbtn{margin-top:9px;background:none;border:1.5px dashed var(--accent);color:var(--accent);
    border-radius:11px;padding:10px;width:100%;font-size:14px;font-weight:700;cursor:pointer}
  [data-theme="dark"] .addbtn{color:var(--cyan)}

  /* simple birthday picker */
  .dob3{display:flex;gap:8px}
  .dob3 select{flex:1;min-width:0;background:var(--field);color:var(--ink);border:1.5px solid var(--fieldline);
    border-radius:11px;padding:12px 8px;font-size:15px;font-family:inherit;cursor:pointer}
  .dob3 select:focus{outline:none;border-color:var(--accent)}

  /* 🎤 voice typing */
  .tawrap{position:relative}
  .tawrap textarea{padding-right:52px}
  .micbtn{position:absolute;right:9px;bottom:9px;width:38px;height:38px;border-radius:50%;
    border:1.5px solid var(--fieldline);background:var(--field);font-size:17px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:.15s;padding:0}
  .micbtn:hover{border-color:var(--accent)}
  .micbtn.rec{background:#c0392b;border-color:#c0392b;animation:micpulse 1.1s infinite}
  @keyframes micpulse{0%,100%{box-shadow:0 0 0 0 rgba(192,57,43,.45)}50%{box-shadow:0 0 0 9px rgba(192,57,43,0)}}
  .micstatus{font-size:12.5px;color:var(--muted);margin-top:6px;font-weight:600}

  /* 📷 photo scan */
  .scanbtn{margin-top:9px;background:var(--chip);border:1.5px solid var(--chipline);color:var(--chipink);
    border-radius:11px;padding:11px;width:100%;font-size:14px;font-weight:700;cursor:pointer;transition:.12s}
  .scanbtn:hover{border-color:var(--accent)}
  .scanout>div{margin-top:9px;border-radius:11px;padding:11px 13px;font-size:14px;line-height:1.5}
  .scanwait{background:var(--chip);border:1.5px dashed var(--chipline)}
  .scanhit{background:var(--accent-soft);border:1.5px solid var(--fieldline)}
  .scanerr{background:#fdf3da;border:1.5px solid #e6b800;color:#7a5b00}
  [data-theme="dark"] .scanerr{background:#3a3320;border-color:#6b5d1f;color:#f1c40f}
  .scanok{background:var(--accent-soft);border:1.5px solid var(--fieldline);color:var(--good);font-weight:700}
  .scanhit .btnrow{display:flex;gap:8px;margin-top:9px}
  .scanhit .btnrow button{flex:1;border:none;border-radius:9px;padding:10px;font-size:13.5px;font-weight:800;cursor:pointer;font-family:inherit}
  .scanhit .scanadd{background:var(--green);color:var(--on-accent)}
  .scanhit .scanno{background:var(--chip);color:var(--chipink);border:1.5px solid var(--chipline)}

  /* 🎒 bring-to-meeting + 🧹 wipe (thank-you screen) */
  .bringbox{max-width:430px;margin:18px auto 0;text-align:left;background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:15px 17px;box-shadow:0 2px 10px rgba(20,40,70,.05)}
  .bringbox h3{font-size:15px;margin-bottom:9px}
  .bringbox .bri{display:flex;gap:10px;align-items:flex-start;font-size:14px;padding:5px 0}
  .bringbox .bri .e{flex:none;font-size:16px}
  .wipe{margin:18px auto 0;max-width:430px}
  .wipe button{background:none;border:1.5px solid var(--fieldline);color:var(--muted);border-radius:11px;
    padding:11px 16px;font-size:13.5px;font-weight:700;cursor:pointer;font-family:inherit;width:100%}
  .wipe button:hover{border-color:#c0392b;color:#c0392b}
  .wipe .hint{font-size:12px;color:var(--muted);margin-top:6px}

  /* add-your-own row + custom chips */
  .addother{display:flex;gap:8px;margin-top:10px}
  .addother-inp{flex:1}
  .addother-btn{flex:none;background:var(--navy);color:#fff;border:none;border-radius:11px;padding:0 18px;font-size:14px;font-weight:800;cursor:pointer;white-space:nowrap}
  [data-theme="dark"] .addother-btn{background:var(--cyan);color:#0a0b0d}
  .chip.custom{background:#fdf3da;border-color:#e6b800;color:#7a5b00}
  [data-theme="dark"] .chip.custom{background:#3a3320;border-color:#6b5d1f;color:#f1c40f}
  .chip.custom .cx{font-weight:900;opacity:.75;margin-left:2px}

  /* multi-select dropdown (checklist) */
  .dropdown{position:relative}
  .dd-head{width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;
    background:var(--field);border:1.5px solid var(--fieldline);border-radius:11px;padding:12px 13px;
    font-size:15px;color:var(--ink);cursor:pointer;font-family:inherit;text-align:left}
  .dd-head:focus{outline:none}
  .dd-head.open{border-color:var(--accent);box-shadow:0 0 0 3px rgba(17,17,20,.12)}
  .dd-summary{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .dd-summary.ph{color:var(--muted)}
  .dd-caret{flex:none;transition:transform .2s;color:var(--muted)}
  .dd-head.open .dd-caret{transform:rotate(180deg)}
  .dd-panel{margin-top:6px;background:var(--card);border:1.5px solid var(--fieldline);border-radius:12px;
    padding:6px;max-height:50vh;overflow:auto;box-shadow:var(--shadow)}
  .dd-opt{display:flex;align-items:center;gap:11px;padding:11px 10px;border-radius:8px;cursor:pointer;font-size:14.5px}
  .dd-opt:hover{background:var(--chip)}
  .dd-opt input{width:19px;height:19px;accent-color:var(--green);flex:none}
  .dd-opt .cx{color:var(--muted);font-style:italic;font-size:12px}

  /* single-select dropdown + medication picker */
  select[data-selectkey],select.medpicker{width:100%;background:var(--field);color:var(--ink);
    border:1.5px solid var(--fieldline);border-radius:11px;padding:12px 13px;font-size:15px;font-family:inherit;cursor:pointer}
  select[data-selectkey]:focus,select.medpicker:focus{outline:none;border-color:var(--accent)}
  select.medpicker{margin-bottom:9px;font-weight:600}

  /* Medic Alert engraving rows */
  .engrave{display:grid;gap:8px}
  .eng-row{display:flex;align-items:center;gap:11px;background:var(--field);border:1.5px solid var(--fieldline);
    border-radius:11px;padding:11px 12px;font-size:14.5px;cursor:pointer}
  .eng-row input[type=checkbox]{width:19px;height:19px;accent-color:var(--green);flex:none}
  .eng-lbl{font-weight:700;flex:none;min-width:84px}
  .eng-val{color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .eng-val.empty{font-style:italic;opacity:.65}
  .eng-row.phone{cursor:default;flex-wrap:wrap;border-style:dashed}
  .eng-row.phone input{flex:1;min-width:150px;background:transparent;border:none;border-bottom:1.5px solid var(--fieldline);
    border-radius:0;padding:7px 2px;font-size:15px;color:var(--ink)}
  .eng-row.phone input:focus{outline:none;border-color:var(--accent)}

  /* ── Nav ── */
  .nav{display:flex;gap:10px;margin-top:24px}
  .btn{flex:1;border:none;border-radius:13px;padding:14px;font-size:15.5px;font-weight:800;cursor:pointer;
    font-family:inherit;transition:.15s;display:flex;align-items:center;justify-content:center;gap:7px}
  .btn.primary{background:var(--green);color:var(--on-accent);box-shadow:0 6px 18px rgba(11,12,15,.18)}
  .btn.primary:hover{background:var(--green-d)}
  .btn.ghost{flex:0 0 auto;min-width:96px;background:transparent;border:1.5px solid var(--fieldline);color:var(--muted)}
  .btn.ghost:hover{border-color:var(--accent);color:var(--ink)}
  .saved{text-align:center;font-size:12px;color:var(--muted);margin-top:12px;display:flex;align-items:center;justify-content:center;gap:6px}
  .saved b{color:var(--good)}

  /* ── Welcome ── */
  .welcome{text-align:center;padding:14px 6px}
  .welcome .big{width:74px;height:74px;border-radius:22px;background:linear-gradient(135deg,var(--navy),var(--navy-d));
    color:#fff;font-size:36px;display:flex;align-items:center;justify-content:center;margin:8px auto 16px;box-shadow:var(--shadow)}
  .welcome h1{font-size:24px;margin-bottom:8px}
  .welcome p{font-size:15px;color:var(--muted);max-width:430px;margin:0 auto 10px}
  .wpts{text-align:left;max-width:380px;margin:16px auto 0;display:grid;gap:9px}
  .wpts div{font-size:14px;display:flex;gap:10px;align-items:flex-start}
  .wpts .e{font-size:18px;flex:none}
  .langpick{display:flex;gap:10px;justify-content:center;margin:18px 0 4px}
  .langpick{flex-wrap:wrap}
  .langpick .chip{font-size:15px;padding:10px 20px}
  .langmenu{position:absolute;right:12px;top:54px;background:var(--card);border:1px solid var(--line);
    border-radius:12px;box-shadow:var(--shadow);display:flex;flex-direction:column;min-width:172px;z-index:60;overflow:hidden}
  .langmenu .lm{background:none;border:none;text-align:left;padding:11px 15px;font-size:14.5px;font-weight:600;
    color:var(--ink);cursor:pointer;font-family:inherit}
  .langmenu .lm:hover{background:var(--chip)}
  .langmenu .lm.on{background:var(--accent);color:var(--on-accent)}

  /* ── Review ── */
  .rev-sec{background:var(--card);border:1px solid var(--line);border-radius:14px;margin-top:12px;overflow:hidden;box-shadow:0 2px 10px rgba(20,40,70,.05)}
  .rev-head{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:var(--chip);font-weight:800;font-size:14px}
  .rev-head .edit{font-size:12.5px;color:var(--navy);background:#fff;border:1px solid var(--chipline);border-radius:18px;padding:4px 12px;cursor:pointer;font-weight:700}
  [data-theme="dark"] .rev-head .edit{background:#1a1c20;color:var(--cyan)}
  .rev-body{padding:6px 14px 12px}
  .rev-item{padding:7px 0;border-bottom:1px solid var(--line);font-size:14px}
  .rev-item:last-child{border-bottom:none}
  .rev-item .k{color:var(--muted);font-size:12.5px;font-weight:600}
  .rev-item .v{margin-top:1px;white-space:pre-wrap}
  .rev-item .v.empty{color:var(--muted);font-style:italic;opacity:.7}

  /* ── Done ── */
  .done{text-align:center;padding:30px 10px}
  .done .check{width:84px;height:84px;border-radius:50%;background:var(--good);color:#fff;font-size:46px;
    display:flex;align-items:center;justify-content:center;margin:0 auto 18px;box-shadow:0 8px 26px rgba(39,174,96,.4)}
  .done h1{font-size:24px;margin-bottom:8px}
  .done p{font-size:15px;color:var(--muted);max-width:420px;margin:0 auto 10px}

  /* fallback box */
  .fallback{display:none;margin-top:18px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;text-align:left}
  .fallback h3{font-size:15px;margin-bottom:8px}
  .fallback p{font-size:13px;color:var(--muted);margin-bottom:10px}
  .fallback textarea{min-height:120px;font-size:12px}
  .fbtns{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
  .fbtns .btn{flex:1;min-width:130px;font-size:13.5px;padding:11px}
  .btn.blue{background:var(--navy);color:#fff}
  .btn.gmail{background:#ea4335;color:#fff}
  .btn.save{background:#0f766e;color:#fff}

  .err{color:#c0392b;font-size:13px;font-weight:600;margin-top:8px;display:none}
  .footer{text-align:center;font-size:11px;color:var(--muted);padding:14px;opacity:.85}
  .lockicon{font-size:11px}

  /* ── Keyboard accessibility: clear focus rings on every tap-target ── */
  .chip:focus-visible,.seg:focus-visible,.btn:focus-visible,.iconbtn:focus-visible,
  .edit:focus-visible,.addbtn:focus-visible,.addother-btn:focus-visible,
  .dd-head:focus-visible,.eng-row:focus-visible,.langpick .chip:focus-visible{
    outline:3px solid var(--accent);outline-offset:2px;border-radius:8px;
  }
  [data-theme="dark"] .chip:focus-visible,[data-theme="dark"] .seg:focus-visible{outline-color:var(--accent)}
  .chip[role=button]{ -webkit-tap-highlight-color:transparent }

  /* tip callout (e.g. "have meds handy") */
  .tipbox{display:flex;gap:8px;align-items:flex-start;background:#fff8e1;border:1px solid #f0d77a;
    color:#7a5b00;border-radius:11px;padding:10px 12px;font-size:13px;margin:2px 0 6px;line-height:1.45}
  [data-theme="dark"] .tipbox{background:#332c16;border-color:#5f5320;color:#f1c40f}
  /* info note (e.g. Medic Alert "want info") */
  .notebox{display:flex;gap:8px;align-items:flex-start;background:var(--accent-soft);border:1px solid var(--line);
    color:var(--ink);border-radius:11px;padding:11px 13px;font-size:13.5px;line-height:1.45}
  [data-theme="dark"] .notebox{background:var(--accent-soft);border-color:var(--line);color:var(--ink)}

  /* welcome personalization + trust line */
  .welcome .hello{font-size:19px;font-weight:800;color:var(--navy);margin-bottom:2px}
  [data-theme="dark"] .welcome .hello{color:var(--cyan)}
  .trust{max-width:440px;margin:16px auto 0;background:var(--chip);border:1px solid var(--chipline);
    border-radius:12px;padding:11px 14px;font-size:12.8px;color:var(--muted);display:flex;gap:9px;
    align-items:flex-start;text-align:left;line-height:1.5}
  .trust .ti{flex:none;font-size:15px}
  .trust b{color:var(--ink)}

  /* warmer thank-you "what's next" list */
  .done-next{text-align:left;max-width:410px;margin:20px auto 0;display:grid;gap:10px}
  .done-next div{font-size:14px;display:flex;gap:11px;align-items:flex-start;background:var(--card);
    border:1px solid var(--line);border-radius:12px;padding:11px 13px}
  .done-next .e{font-size:18px;flex:none}
  /* Microsoft Bookings "pick a meeting time" button (thank-you screen) */
  .done-next .booknav{background:none;border:none;padding:0;margin-top:2px}
  .booknav .btn,.bookcard .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
    text-decoration:none;box-sizing:border-box}
  /* Booking card on the meeting-preferences step */
  .bookcard{background:var(--card);border:1.5px solid var(--fieldline);border-radius:14px;
    padding:14px 15px;display:grid;gap:12px}
  .bookcard .bkhead{display:flex;gap:10px;align-items:flex-start;font-size:14px}
  .bookcard .bkcal{font-size:19px;flex:none}
  /* Booking line on the welcome screen */
  .bookwel a{color:inherit}
</style>
</head>

// Safe localStorage. Apps Script serves the form in a sandboxed iframe where
// storage access can THROW (esp. Incognito / third-party storage blocked).
// Wrapping it means a failure just disables auto-save instead of halting the
// whole script (which had left the page blank except the static header).
const LS = (function(){
  var store=null; try{ store=window.localStorage; }catch(e){}
  return {

ਾਣਕਾਰੀ ਚਾਹੀਦੀ ਹੈ","What should be engraved on the Medic Alert ID?":"Medic Alert ID 'ਤੇ ਕੀ ਲਿਖਿਆ (ਉੱਕਰਿਆ) ਜਾਵੇ?","We filled these in from your earlier answers — uncheck any you don't want, and add the emergency contact phone number.":"ਅਸੀਂ ਇਹ ਤੁਹਾਡੇ ਪਹਿਲੇ ਜਵਾਬਾਂ ਤੋਂ ਭਰ ਦਿੱਤੇ ਹਨ — ਜੋ ਨਹੀਂ ਚਾਹੀਦਾ, ਉਸ ਤੋਂ ਨਿਸ਼ਾਨ ਹਟਾ ਦਿਓ, ਅਤੇ ਐਮਰਜੈਂਸੀ ਸੰਪਰਕ ਦਾ ਫ਼ੋਨ ਨੰਬਰ ਸ਼ਾਮਲ ਕਰੋ।","Great — your coordinator will bring Medic Alert information to your meeting so you can decide if it's a good fit.":"ਬਹੁਤ ਵਧੀਆ — ਤੁਹਾਡਾ ਕੋਆਰਡੀਨੇਟਰ ਮੀਟਿੰਗ ਵਿੱਚ Medic Alert ਦੀ ਜਾਣਕਾਰੀ ਲੈ ਕੇ ਆਵੇਗਾ, ਤਾਂ ਜੋ ਤੁਸੀਂ ਫ਼ੈਸਲਾ ਕਰ ਸਕੋ ਕਿ ਇਹ ਠੀਕ ਰਹੇਗਾ ਜਾਂ ਨਹੀਂ।","Anything else we should know to keep them safe?":"ਉਹਨਾਂ ਨੂੰ ਸੁਰੱਖਿਅਤ ਰੱਖਣ ਲਈ ਸਾਨੂੰ ਹੋਰ ਕੀ ਪਤਾ ਹੋਣਾ ਚਾਹੀਦਾ ਹੈ?","Benefits & income":"ਲਾਭ (ਬੈਨੀਫਿਟ) ਅਤੇ ਆਮਦਨ","Quick check on benefits — tap what applies, skip if unsure.":"ਲਾਭਾਂ ਬਾਰੇ ਛੋਟੀ ਜਿਹੀ ਜਾਂਚ — ਜੋ ਲਾਗੂ ਹੋਵੇ, ਟੈਪ ਕਰੋ; ਪੱਕਾ ਪਤਾ ਨਾ ਹੋਵੇ ਤਾਂ ਛੱਡ ਦਿਓ।","Which do they receive? (tap all)":"ਉਹਨਾਂ ਨੂੰ ਕਿਹੜੇ ਮਿਲਦੇ ਹਨ? (ਸਭ 'ਤੇ ਟੈਪ ਕਰੋ)","AAP (Adoption Assistance)":"AAP (ਗੋਦ ਲੈਣ ਦੀ ਸਹਾਇਤਾ)","SSI amount received":"SSI ਦੀ ਮਿਲਣ ਵਾਲੀ ਰਕਮ","$ per month":"$ ਪ੍ਰਤੀ ਮਹੀਨਾ","SSDI amount received":"SSDI ਦੀ ਮਿਲਣ ਵਾਲੀ ਰਕਮ","AAP amount received":"AAP ਦੀ ਮਿਲਣ ਵਾਲੀ ਰਕਮ","Who manages their money?":"ਉਹਨਾਂ ਦੇ ਪੈਸੇ ਕੌਣ ਸੰਭਾਲਦਾ ਹੈ?","Themselves":"ਉਹ ਖ਼ੁਦ","Parent / family":"ਮਾਤਾ-ਪਿਤਾ / ਪਰਿਵਾਰ","Other payee":"ਕੋਈ ਹੋਰ ਪੈਸੇ ਸੰਭਾਲਣ ਵਾਲਾ (payee)","Emergency contacts":"ਐਮਰਜੈਂਸੀ ਸੰਪਰਕ","Who should we call first, and what should responders know?":"ਪਹਿਲਾਂ ਅਸੀਂ ਕਿਸ ਨੂੰ ਫ਼ੋਨ ਕਰੀਏ, ਅਤੇ ਮਦਦ ਲਈ ਆਉਣ ਵਾਲਿਆਂ ਨੂੰ ਕੀ ਪਤਾ ਹੋਣਾ ਚਾਹੀਦਾ ਹੈ?","Add at least one.":"ਘੱਟੋ-ਘੱਟ ਇੱਕ ਸ਼ਾਮਲ ਕਰੋ।","What should 911 / responders know?":"911 / ਮਦਦ ਲਈ ਆਉਣ ਵਾਲਿਆਂ ਨੂੰ ਕੀ ਪਤਾ ਹੋਣਾ ਚਾਹੀਦਾ ਹੈ?","e.g. has autism, limited speech, wears Medic Alert…":"ਜਿਵੇਂ ਔਟਿਜ਼ਮ ਹੈ, ਘੱਟ ਬੋਲਦੇ ਹਨ, Medic Alert ਪਾਉਂਦੇ ਹਨ…","Your meeting preferences":"ਮੀਟਿੰਗ ਬਾਰੇ ਤੁਹਾਡੀ ਪਸੰਦ","Last step! How would you like the IPP meeting to happen?":"ਆਖਰੀ ਕਦਮ! ਤੁਸੀਂ IPP ਮੀਟਿੰਗ ਕਿਵੇਂ ਕਰਨੀ ਚਾਹੋਗੇ?","Meeting format":"ਮੀਟਿੰਗ ਦਾ const LANGS = [
  {c:"en", n:"English",     f:"\u{1F1FA}\u{1F1F8}"},
  {c:"es", n:"Espa\u00f1ol",f:"\u{1F1F2}\u{1F1FD}"},
  {c:"hmn",n:"Hmoob",       f:""},
  {c:"vi", n:"Ti\u1ebfng Vi\u1ec7t", f:"\u{1F1FB}\u{1F1F3}"},
  {c:"tl", n:"Tagalog",     f:"\u{1F1F5}\u{1F1ED}"},
  {c:"pa", n:"\u0a2a\u0a70\u0a1c\u0a3e\u0a2c\u0a40", f:""}
];
const langName = c => { const L=LANGS.find(l=>l.c===c); return L?L.n:c; };
function X(en,es,vals){
  let s = lang==="en" ? en : lang==="es" ? es : (((XTRA[lang]||{})[en]) ?? en);
  if(vals) for(let i=0;i<vals.length;i++) s = s.split("{"+i+"}").join(vals[i]);
  return s;
}
const tx = o => { if(!o) return ""; const v=o[lang]; if(v!=null) return v;
  const k=o.en, t=XTRA[lang], r=(t && typeof k==="string") ? t[k] : null;
  return r!=null ? r : (k ?? ""); };

   3) RENDER
   ═══════════════════════════════════════════════════════════════════ */
const stage = document.getElementById("stage");

function render(){
  stopSpeak();          // navigating away stops any read-aloud in progress
  stage.innerHTML = "";
  document.getElementById("footPriv").textContent = tx(T.footer);
  const _bt=document.getElementById("barTtl"); if(_bt) _bt.textContent=tx(T.formTitle);
  renderStepper();
  if (idx === -1){ renderWelcome(); return; }
  if (idx === STEPS.length){ renderReview(); return; }
  if (idx === STEPS.length+1){ renderDone(); return; }
  renderStep(STEPS[idx]);
  window.scrollTo({top:0,behavior:"smooth"});
}

// Segmented step bar: every step is an equal-width clickable cell, so the
// click position maps to the step (left = step 1, middle = ~step 5, etc.).
function renderStepper(){
  const w = document.getElementById("segWrap");
  if (idx < 0 || idx > STEPS.length){ w.style.display="none"; return; }  // hide on welcome/done
  w.style.display="block";
  const total = STEPS.length + 1; // steps + review
  let html = STEPS.map((s,i)=>`<button type="button" class="seg ${i===idx?"active":""} ${i<idx?"done":""}" data-go="${i}" title="${esc(tx(s.title))}" aria-label="${esc(tx(s.title))}">${i+1}</button>`).join("");
  html += `<button type="button" class="seg ${idx===STEPS.length?"active":""}" data-go="${STEPS.length}" title="${esc(tx(STEP_REVIEW_SHORT))}" aria-label="${esc(tx(STEP_REVIEW_SHORT))}">📑</button>`;
  const bar = document.getElementById("segBar");
  bar.innerHTML = html;
  bar.querySelectorAll(".seg").forEach(b=>b.onclick=()=>{ idx=+b.dataset.go; persist(); render(); });
  const label = document.getElementById("segLabel");
  if (idx === STEPS.length) label.innerHTML = `${stepSVG("review",15,"#e8eaee")} <span>${tx(STEP_REVIEW_SHORT)} · ${X(T.stepOf.en,T.stepOf.es,[total,total])}</span>`;
  else label.innerHTML = `${stepSVG(STEP_ICON[idx],15,STEP_COLOR[idx])} <span>${tx(STEP_SHORT[idx])} · ${X(T.stepOf.en,T.stepOf.es,[idx+1,total])}</span>`;
  const _pf=document.getElementById("pFill");
  if(_pf){ const _n=(idx===STEPS.length)?total:(idx+1); _pf.style.width=Math.round(_n/total*100)+"%"; }
}

      <div><span class="e">⏱️</span><span>${X("Takes about 5–7 minutes","Toma unos 5–7 minutos")}</span></div>

      <div><span class="e">🔒</span><span>${X("Private until you press Send","Privado hasta que presione Enviar")}</span></div>
    </div>
    <div class="trust">
      <span class="ti">🛡️</span>
      <span>${X("This secure form was sent to you by <b>{0}</b>, your VMRC Service Coordinator. {1}","Este formulario seguro fue enviado por <b>{0}</b>, su Coordinador de Servicios de VMRC. {1}",[esc(coordName),phoneLine])}</span>

    ${ bookUrl ? `<div class="trust bookwel">
      <span class="ti">📅</span>

    </div>

  const _rf=document.getElementById("reuseFile"), _rb=document.getElementById("reuseBtn");

function renderStep(step){
  const d = document.createElement("div");
  d.className = "step active";
  let html = `<div class="intro"><div class="av" style="background:${STEP_COLOR[idx]}">${stepSVG(STEP_ICON[idx],24,"#fff")}</div><div><h2>${tx(step.title)}</h2><p>${tx(step.intro)}</p></div></div>`;
  step.fields.forEach(f=>{ html += fieldHTML(f); });
  html += `<div class="nav">
      <button class="btn ghost" id="backBtn">${tx(T.back)}</button>
      <button class="btn primary" id="nextBtn">${idx===STEPS.length-1?tx(T.review):tx(T.next)}</button>
    </div>
    <div class="saved" id="savedline">💾 ${tx(T.autosave)}</div>`;
  d.innerHTML = html;
  stage.appendChild(d);
  wireFields(step);
  document.getElementById("backBtn").onclick = ()=>{ idx--; persist(); render(); };
  document.getElementById("nextBtn").onclick = ()=>{ idx++; persist(); render(); };
}

function fieldHTML(f){
  const hide = (f.showIf && !showIfMet(f)) ? `style="display:none"` : "";
  // info-only note (no input) — e.g. Medic Alert "would like info"
  if (f.type==="note"){
    return `<div class="field" data-fieldkey="${f.key}" ${hide}><div class="notebox"><span>ℹ️</span><span>${tx(f.label)}</span></div></div>`;
  }
  // Microsoft Bookings calendar card — Microsoft's CSP blocks true embedding
  // (frame-ancestors), so the card opens the live calendar in a new tab.
  if (f.type==="booking"){
    const u=(window.VMRC_CONFIG.bookingUrl||"").trim();
    if(!u) return "";
    return `<div class="field" data-fieldkey="${f.key}"><div class="bookcard">
      <div class="bkhead"><span class="bkcal">📅</span><span class="bktx">${X("Want to pick the meeting time yourself? Choose a time that works for you — online or in person.","¿Quiere elegir usted la hora de la reunión? Escoja el horario que mejor le convenga — en línea o en persona.")}</span></div>
      <a class="btn primary" id="stepBookBtn" href="${esc(u)}" target="_blank" rel="noopener">📅 ${X("Pick a meeting time","Elegir la hora de la reunión")}</a>
    </div></div>`;
  }
  const optTag = f.optional ? `<span class="opt">${X("optional","opcional")}</span>` : "";
  const hint = f.hint ? `<div class="hint">${tx(f.hint)}</div>` : "";
  const tip  = f.tip ? `<div class="tipbox"><span>💊</span><span>${tx(f.tip)}</span></div>` : "";
  let inner = "";
  if (["text","tel","email","date"].includes(f.type)){
    inner = `<input type="${f.type}" data-key="${f.key}" value="${esc(data[f.key]||"")}" placeholder="${tx(f.ph)||""}">`;
  } else if (f.type==="dob3"){
    // "Dates simpler": three dropdowns instead of a date picker. Writes the same
    // ISO YYYY-MM-DD into data[key], so the payload/fence/IPP import are unchanged.
    // Month names come from Intl in the family's language (hmn falls back to English).
    const cur=(data[f.key]||"").split("-"), yy=cur[0]||"", mm=cur[1]||"", dd2=cur[2]||"";
    // explicit month tables (Intl locale data is unreliable across devices;
    // Hmong RPA convention in US community materials = English month names)
    const MONTHS={
      en:["January","February","March","April","May","June","July","August","September","October","November","December"],
      es:["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"],
      vi:["Tháng 1","Tháng 2","Tháng 3","Tháng 4","Tháng 5","Tháng 6","Tháng 7","Tháng 8","Tháng 9","Tháng 10","Tháng 11","Tháng 12"],
      tl:["Enero","Pebrero","Marso","Abril","Mayo","Hunyo","Hulyo","Agosto","Setyembre","Oktubre","Nobyembre","Disyembre"],
      pa:["ਜਨਵਰੀ","ਫਰਵਰੀ","ਮਾਰਚ","ਅਪ੍ਰੈਲ","ਮਈ","ਜੂਨ","ਜੁਲਾਈ","ਅਗਸਤ","ਸਤੰਬਰ","ਅਕਤੂਬਰ","ਨਵੰਬਰ","ਦਸੰਬਰ"]
    };
    const months=MONTHS[lang]||MONTHS.en;
    const nowY=new Date().getFullYear();
    inner = `<div class="dob3" data-key="${f.key}">
      <select data-dob="m" aria-label="Month"><option value="">${X("Month","Mes")}</option>${months.map((n,i)=>{const v=String(i+1).padStart(2,"0");return `<option value="${v}" ${mm===v?"selected":""}>${esc(n)}</option>`;}).join("")}</select>
      <select data-dob="d" aria-label="Day"><option value="">${X("Day","Día")}</option>${Array.from({length:31},(_,i)=>{const v=String(i+1).padStart(2,"0");return `<option value="${v}" ${dd2===v?"selected":""}>${i+1}</option>`;}).join("")}</select>
      <select data-dob="y" aria-label="Year"><option value="">${X("Year","Año")}</option>${Array.from({length:95},(_,i)=>{const y=String(nowY-i);return `<option ${yy===y?"selected":""}>${y}</option>`;}).join("")}</select>
    </div>`;
  } else if (f.type==="textarea"){
    // 🎤 speak-instead-of-typing on long answers (hidden when the language has
    // no speech-recognition support, e.g. Hmong)
    const mic = (window.SpeechRecognition||window.webkitSpeechRecognition) && SPEECH_LOCALE[lang]
      ? `<button type="button" class="micbtn" data-mic="${f.key}" title="${X("Speak instead of typing","Hablar en vez de escribir")}" aria-label="${X("Speak instead of typing","Hablar en vez de escribir")}">🎤</button>` : "";
    inner = `<div class="tawrap"><textarea data-key="${f.key}" placeholder="${tx(f.ph)||""}">${esc(data[f.key]||"")}</textarea>${mic}</div>`+
            `<div class="micstatus" data-micstatus="${f.key}" hidden></div>`;
  } else if (f.type==="chips"){
    const sel = toArr(data[f.key]);
    const optVals = f.options.map(o=>o.v);
    let chipsHtml = f.options.map(o=>`<div class="chip ${o.none?"none":""} ${sel.includes(o.v)?"on":""}" role="button" tabindex="0" aria-pressed="${sel.includes(o.v)?"true":"false"}" data-v="${esc(o.v)}" data-none="${o.none?1:0}">${o[lang]??o.en}</div>`).join("");
    if (f.addOther){
      const customs = sel.filter(v=>!optVals.includes(v));
      chipsHtml += customs.map(v=>`<div class="chip custom" role="button" tabindex="0" aria-label="${esc(v)} (remove)" data-v="${esc(v)}" data-custom="1">${esc(v)} <span class="cx">✕</span></div>`).join("");
    }
    inner = `<div class="chips" data-key="${f.key}" data-single="${f.single?1:0}">${chipsHtml}</div>`;
    if (f.addOther){
      inner += `<div class="addother"><input type="text" class="addother-inp" data-addother="${f.key}" placeholder="${tx(T.addOtherPh)}">`+
               `<button type="button" class="addother-btn" data-addotherbtn="${f.key}">${tx(T.add)}</button></div>`;
    }
    if (f.key==="insurance"){
      inner += `<button type="button" class="scanbtn" data-scan="insurance" data-scankey="${f.key}">📷 ${X("Scan an insurance card","Escanear una tarjeta de seguro")}</button>`+
        `<input type="file" accept="image/*" capture="environment" data-scaninput="${f.key}" style="display:none">`+
        `<div class="scanout" data-scanout="${f.key}"></div>`+
        `<div class="hint">📵 ${X("The photo is read on this device only — it is never saved or sent anywhere.","La foto se lee solo en este dispositivo — nunca se guarda ni se envía a ningún lado.")}</div>`;
    }
  } else if (f.type==="dropdown"){
    const sel = toArr(data[f.key]);
    const optVals = f.options.map(o=>o.v);
    const summary = sel.length ? sel.join(", ") : (X("Select…","Seleccione…"));
    let rows = f.options.map(o=>`<label class="dd-opt"><input type="checkbox" data-ddv="${esc(o.v)}" ${sel.includes(o.v)?"checked":""}><span>${o[lang]??o.en}</span></label>`).join("");
    if (f.addOther){
      const customs = sel.filter(v=>!optVals.includes(v));
      rows += customs.map(v=>`<label class="dd-opt"><input type="checkbox" data-ddv="${esc(v)}" data-custom="1" checked><span>${esc(v)} <span class="cx">(${X("yours","propio")})</span></span></label>`).join("");
    }
    const addo = f.addOther ? `<div class="addother"><input type="text" class="addother-inp" data-addother="${f.key}" placeholder="${tx(T.addOtherPh)}"><button type="button" class="addother-btn" data-addotherbtn="${f.key}">${tx(T.add)}</button></div>` : "";
    inner = `<div class="dropdown" data-key="${f.key}">`+
      `<button type="button" class="dd-head" data-ddhead="${f.key}"><span class="dd-summary ${sel.length?"":"ph"}">${esc(summary)}</span><span class="dd-caret">▾</span></button>`+
      `<div class="dd-panel" data-ddpanel="${f.key}" hidden>${rows}${addo}</div></div>`;
  } else if (f.type==="select"){
    const cur = (toArr(data[f.key])[0])||"";
    inner = `<select data-selectkey="${f.key}"><option value="">${X("Select…","Seleccione…")}</option>`+
      f.options.map(o=>`<option value="${esc(o.v)}" ${cur===o.v?"selected":""}>${o[lang]??o.en}</option>`).join("")+`</select>`;
  } else if (f.type==="engrave"){
    inner = engraveHTML(f);
  } else if (f.type==="repeat"){
    let picker = "";
    if (f.repeatKind==="med"){
      picker = `<select class="medpicker" data-medpicker="${f.key}"><option value="">${X("➕ Add a common medication…","➕ Agregar un medicamento común…")}</option>`+
        MED_LIST.map(m=>`<option value="${esc(m.name)}">${esc(m.name)} — ${esc(m.dose)}</option>`).join("")+`</select>`;
    }
    inner = picker + `<div class="repeat" data-key="${f.key}" data-kind="${f.repeatKind}"></div>`+
      `<button type="button" class="addbtn" data-add="${f.key}">${f.repeatKind==="med"?tx(T.addMed):tx(T.addContact)}</button>`;
    if (f.repeatKind==="med"){
      inner += `<button type="button" class="scanbtn" data-scan="med" data-scankey="${f.key}">📷 ${X("Scan a medicine bottle instead of typing","Escanear un frasco de medicamento en vez de escribir")}</button>`+
        `<input type="file" accept="image/*" capture="environment" data-scaninput="${f.key}" style="display:none">`+
        `<div class="scanout" data-scanout="${f.key}"></div>`+
        `<div class="hint">📵 ${X("The photo is read on this device only — it is never saved or sent anywhere.","La foto se lee solo en este dispositivo — nunca se guarda ni se envía a ningún lado.")}</div>`;
    }
  }
  const labelFor = ["chips","repeat","dropdown","engrave"].includes(f.type) ? "div" : "label";
  return `<div class="field" data-fieldkey="${f.key}" ${hide}>
      <${labelFor}>${tx(f.label)} ${optTag}</${labelFor}>${hint}${tip}${inner}</div>`;
}

/* ── Medic Alert engraving: auto-filled from earlier answers ── */
function engraveAuto(k){
  if(k==="name") return (data.preferred_name||data.legal_name||"").trim();
  if(k==="diagnosis") return toArr(data.diagnoses).join(", ");
  if(k==="allergies") return allergiesSummary();
  return "";
}
function allergiesSummary(){
  const a=toArr(data.allergies);
  if(a.includes("None")) return (X("None","Ninguna"));
  if(a.includes("Yes")) return (data.allergies_list||"").trim() || (X("Yes","Sí"));
  return "";
}
function engraveChecked(key){ return Array.isArray(data[key]) ? data[key] : ["name","diagnosis","allergies"]; }
function engraveHTML(f){
  const checked = engraveChecked(f.key);
  const phone = data.medic_alert_phone||"";
  const items=[
    ["name", X("Name","Nombre"), engraveAuto("name")],
    ["diagnosis", X("Diagnosis","Diagnóstico"), engraveAuto("diagnosis")],
    ["allergies", X("Allergies","Alergias"), engraveAuto("allergies")],
  ];
  const rows = items.map(([k,lbl,val])=>`<label class="eng-row"><input type="checkbox" data-engk="${k}" ${checked.includes(k)?"checked":""}>`+
    `<span class="eng-lbl">${lbl}</span><span class="eng-val ${val?"":"empty"}">${val?esc(val):(X("(blank)","(en blanco)"))}</span></label>`).join("");
  const phoneRow = `<div class="eng-row phone"><span class="eng-lbl">${X("Emergency phone","Tel. emergencia")}</span>`+
    `<input type="tel" data-engphone="1" value="${esc(phone)}" placeholder="(000) 000-0000"></div>`;
  return `<div class="engrave" data-key="${f.key}">${rows}${phoneRow}</div>`;
}

function wireFields(step){
  step.fields.forEach(f=>{
    const node=stage.querySelector(`.field[data-fieldkey="${f.key}"]`);
    if(node) wireOneField(step,f,node);
  });
}

function wireOneField(step,f,node){
  // text / textarea / tel / email / date
  node.querySelectorAll("input[data-key],textarea[data-key]").forEach(el=>{
    el.addEventListener("input", ()=>{ data[el.dataset.key]=el.value; persist(true); applyShowIf(step); });
  });
  // chips
  const box=node.querySelector(".chips[data-key]");
  if(box){
    const key=box.dataset.key, single=box.dataset.single==="1";
    box.querySelectorAll(".chip").forEach(chip=>{
      chip.onclick=()=>{
        let sel=toArr(data[key]); const v=chip.dataset.v, isNone=chip.dataset.none==="1", isCustom=chip.dataset.custom==="1";
        if(isCustom){ sel=sel.filter(x=>x!==v); data[key]=sel; persist(); rerenderField(step,key); applyShowIf(step); return; }
        if(single){ sel=[v]; }
        else if(isNone){ sel=sel.includes(v)?[]:[v]; }      // "None" clears others
        else { sel=sel.filter(x=>!isNoneVal(box,x)); sel = sel.includes(v)?sel.filter(x=>x!==v):[...sel,v]; }
        data[key]=sel; persist(true);
        box.querySelectorAll(".chip:not(.custom)").forEach(c=>{ const on=sel.includes(c.dataset.v); c.classList.toggle("on",on); c.setAttribute("aria-pressed",on?"true":"false"); });
        applyShowIf(step);
      };
    });
    // add-your-own
    const inp=node.querySelector(`[data-addother="${key}"]`);
    const addBtn=node.querySelector(`[data-addotherbtn="${key}"]`);
    if(inp && addBtn){
      const doAdd=()=>{ const val=(inp.value||"").trim(); if(!val) return;
        let sel=toArr(data[key]).filter(x=>!isNoneVal(box,x));  // adding a real value clears "None"
        if(!sel.some(x=>x.toLowerCase()===val.toLowerCase())) sel.push(val);
        data[key]=sel; inp.value=""; persist(); rerenderField(step,key); applyShowIf(step);
        const ni=stage.querySelector(`[data-addother="${key}"]`); if(ni) ni.focus();
      };
      addBtn.onclick=doAdd;
      inp.addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); doAdd(); } });
    }
  }
  // multi-select dropdown (checklist)
  const dd=node.querySelector(".dropdown[data-key]");
  if(dd){
    const key=dd.dataset.key;
    const head=dd.querySelector(".dd-head"), panel=dd.querySelector(".dd-panel");
    head.onclick=(e)=>{ e.stopPropagation(); const isOpen=!panel.hasAttribute("hidden"); closeAllDropdowns(); if(!isOpen) openDropdown(key); };
    panel.addEventListener("click",e=>e.stopPropagation());
    panel.querySelectorAll('input[type="checkbox"][data-ddv]').forEach(cb=>{
      cb.onchange=()=>{ let sel=toArr(data[key]); const v=cb.dataset.ddv, isCustom=cb.dataset.custom==="1";
        if(cb.checked){ if(!sel.includes(v)) sel.push(v); } else { sel=sel.filter(x=>x!==v); }
        data[key]=sel; persist();
        if(isCustom && !cb.checked){ rerenderField(step,key); openDropdown(key); } else { updateDropdownSummary(dd,key); }
        applyShowIf(step);
      };
    });
    const inp=dd.querySelector(`[data-addother="${key}"]`), addBtn=dd.querySelector(`[data-addotherbtn="${key}"]`);
    if(inp && addBtn){
      const doAdd=()=>{ const val=(inp.value||"").trim(); if(!val) return;
        let sel=toArr(data[key]); if(!sel.some(x=>x.toLowerCase()===val.toLowerCase())) sel.push(val);
        data[key]=sel; inp.value=""; persist(); rerenderField(step,key); openDropdown(key);
        const ni=stage.querySelector(`[data-addother="${key}"]`); if(ni) ni.focus(); applyShowIf(step); };
      addBtn.onclick=(e)=>{ e.stopPropagation(); doAdd(); };
      inp.addEventListener("click",e=>e.stopPropagation());
      inp.addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); e.stopPropagation(); doAdd(); } });
    }
  }
  // single-select dropdown
  const selEl=node.querySelector("select[data-selectkey]");
  if(selEl){ selEl.onchange=()=>{ data[selEl.dataset.selectkey]=selEl.value; persist(); applyShowIf(step); }; }
  // simple birthday picker (3 selects → same ISO YYYY-MM-DD value)
  const dob=node.querySelector(".dob3[data-key]");
  if(dob){
    const key=dob.dataset.key;
    const g=k=>dob.querySelector(`select[data-dob="${k}"]`).value;
    const upd=()=>{ const y=g("y"),m=g("m"),d2=g("d");
      data[key]=(y&&m&&d2)?`${y}-${m}-${d2}`:""; persist(); };
    dob.querySelectorAll("select[data-dob]").forEach(s=>s.onchange=upd);
  }
  // 🎤 voice typing on long answers
  wireMic(node,step);
  // 📷 photo scan (med bottle / insurance card)
  node.querySelectorAll("[data-scan]").forEach(btn=>{
    const key=btn.dataset.scankey, kind=btn.dataset.scan;
    const fi=node.querySelector(`[data-scaninput="${key}"]`);
    if(!fi) return;
    btn.onclick=()=>fi.click();
    fi.onchange=e=>{ const file=e.target.files[0]; e.target.value=""; if(file) runScan(kind,key,file,step); };
  });
  // Medic Alert engraving
  const eng=node.querySelector(".engrave[data-key]");
  if(eng){
    const key=eng.dataset.key;
    if(!Array.isArray(data[key])) data[key]=["name","diagnosis","allergies"];  // default-checked
    eng.querySelectorAll('input[type="checkbox"][data-engk]').forEach(cb=>{
      cb.onchange=()=>{ let sel=Array.isArray(data[key])?data[key].slice():[]; const k=cb.dataset.engk;
        if(cb.checked){ if(!sel.includes(k)) sel.push(k); } else { sel=sel.filter(x=>x!==k); }
        data[key]=sel; persist(); };
    });
    const ph=eng.querySelector("[data-engphone]");
    if(ph) ph.addEventListener("input",()=>{ data.medic_alert_phone=ph.value; persist(true); });
  }
  // repeat rows
  const rep=node.querySelector(".repeat");
  if(rep){
    renderRepeat(rep);
    const addb=node.querySelector("[data-add]");
    if(addb) addb.onclick=()=>{ const key=addb.dataset.add; const arr=Array.isArray(data[key])?data[key]:[];
      arr.push({}); data[key]=arr; persist(); renderRepeat(stage.querySelector(`.repeat[data-key="${key}"]`)); };
    const mp=node.querySelector("select[data-medpicker]");
    if(mp) mp.onchange=()=>{ const name=mp.value; if(!name) return; const key=mp.dataset.medpicker;
      const arr=Array.isArray(data[key])?data[key]:[]; arr.push({name, dose:MED_BY_NAME[name.toLowerCase()]||""});
      data[key]=arr; mp.value=""; persist(); renderRepeat(stage.querySelector(`.repeat[data-key="${key}"]`)); };
  }
}

function updateDropdownSummary(dd,key){
  const sel=toArr(data[key]); const s=dd.querySelector(".dd-summary");
  if(sel.length){ s.textContent=sel.join(", "); s.classList.remove("ph"); }
  else { s.textContent=(X("Select…","Seleccione…")); s.classList.add("ph"); }
}
function openDropdown(key){
  const p=stage.querySelector(`[data-ddpanel="${key}"]`); if(p) p.removeAttribute("hidden");
  const h=stage.querySelector(`[data-ddhead="${key}"]`); if(h) h.classList.add("open");
}
function closeAllDropdowns(){
  stage.querySelectorAll(".dd-panel").forEach(p=>p.setAttribute("hidden",""));
  stage.querySelectorAll(".dd-head").forEach(h=>h.classList.remove("open"));
}

function rerenderField(step,key){
  const f=step.fields.find(x=>x.key===key); if(!f) return;
  const old=stage.querySelector(`.field[data-fieldkey="${key}"]`); if(!old) return;
  const tmp=document.createElement("div"); tmp.innerHTML=fieldHTML(f);
  const fresh=tmp.firstElementChild; old.replaceWith(fresh); wireOneField(step,f,fresh);
}

function isNoneVal(box,v){
  const c=box.querySelector(`.chip[data-v="${CSS.escape(v)}"]`); return c && c.dataset.none==="1";
}

function renderRepeat(box){
  const key=box.dataset.key, kind=box.dataset.kind;
  const arr=Array.isArray(data[key])?data[key]:[];
  box.innerHTML="";
  arr.forEach((row,i)=>{
    const r=document.createElement("div"); r.className="rrow";
    if(kind==="med"){
      r.innerHTML=`<input placeholder="${tx(T.medName)}" value="${esc(row.name||"")}" data-f="name" list="medlist" autocomplete="off">
                   <input placeholder="${tx(T.medDose)}" value="${esc(row.dose||"")}" data-f="dose">
                   <button class="del" title="Remove">✕</button>`;
    } else {
      r.innerHTML=`<input placeholder="${tx(T.cName)}" value="${esc(row.name||"")}" data-f="name">
                   <input placeholder="${tx(T.cRel)}" value="${esc(row.rel||"")}" data-f="rel" style="max-width:120px">
                   <input placeholder="${tx(T.cPhone)}" value="${esc(row.phone||"")}" data-f="phone" style="max-width:130px">
                   <button class="del" title="Remove">✕</button>`;
    }
    r.querySelectorAll("input").forEach(inp=>inp.addEventListener("input",()=>{
      arr[i][inp.dataset.f]=inp.value;
      if(kind==="med" && inp.dataset.f==="name"){
        const dose=MED_BY_NAME[(inp.value||"").trim().toLowerCase()];
        if(dose && !(arr[i].dose||"").trim()){ arr[i].dose=dose; const di=r.querySelector('[data-f="dose"]'); if(di) di.value=dose; }
      }
      data[key]=arr; persist(true);
    }));
    r.querySelector(".del").onclick=()=>{ arr.splice(i,1); data[key]=arr; persist(); renderRepeat(box); };
    box.appendChild(r);
  });
}

function showIfMet(f){
  if(!f.showIf) return true;
  const cur=toArr(data[f.showIf[0]]);
  const want=Array.isArray(f.showIf[1])?f.showIf[1]:[f.showIf[1]];
  return cur.some(v=>want.includes(v));
}
function applyShowIf(step){
  step.fields.forEach(f=>{
    if(!f.showIf) return;
    const el=stage.querySelector(`.field[data-fieldkey="${f.key}"]`);
    if(el) el.style.display = showIfMet(f) ? "" : "none";
  });
}

/* ── Review ── */
function renderReview(){
  const d=document.createElement("div"); d.className="step active";
  let html=`<div class="intro"><div class="av">📑</div><div>
      <h2>${X("Review your answers","Revise sus respuestas")}</h2>
      <p>${X("Check everything, then press Send. You can edit any section.","Verifique todo y presione Enviar. Puede editar cualquier sección.")}</p></div></div>`;
  if(data.__imported){

/* ═══════════════════════════════════════════════════════════════════
   3b) 📷 PHOTO SCAN — med bottles & insurance cards
   OCR runs entirely IN THE BROWSER (tesseract.js, lazy-loaded from a CDN on
   first use). The photo is processed in memory and never stored, uploaded,
   or added to the answers — zero PHI egress. Offline copies simply show a
   friendly "needs internet" note if the library can't load.
   ═══════════════════════════════════════════════════════════════════ */
let _tessP=null;
function loadTesseract(){
  if(window.Tesseract) return Promise.resolve();
  if(_tessP) return _tessP;
  _tessP=new Promise((res,rej)=>{ const s=document.createElement("script");
    s.src="https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js";
    s.onload=()=>res(); s.onerror=()=>{ _tessP=null; rej(new Error("offline")); };
    document.head.appendChild(s); });
  return _tessP;
}
function normOCR(s){ return String(s||"").toUpperCase().replace(/[^A-Z0-9 .\/-]/g," ").replace(/\s+/g," "); }
// Fuzzy med match: any generic/brand token (≥5 chars) from MED_LIST found in the
// OCR text wins; longest token wins ties. Dose from a units regex.
function __matchMed(text){
  const T=normOCR(text);
  let best=null;
  MED_LIST.forEach(m=>{
    m.name.split(/[()\/]/).map(x=>x.trim()).filter(Boolean).forEach(tok=>{
      const TK=tok.toUpperCase();
      if(TK.length>=5 && T.indexOf(TK)>-1 && (!best || TK.length>best.tok.length)) best={name:m.name, tok:TK, dose:m.dose};
    });
  });
  const dm=T.match(/(\d+(?:\.\d+)?)\s?(MCG|MG|ML|IU|UNITS?|G)\b/);
  return { name: best?best.name:null,
           dose: dm?(dm[1]+" "+dm[2].toLowerCase()):"",
           raw: T.slice(0,120) };
}
const INS_PATTERNS=[
  [/MEDI[\s-]?CAL|MEDICAID|BENEFITS IDENTIFICATION/, "Medi-Cal"],
  [/SAN JOAQUIN|HPSJ/, "Health Plan San Joaquin"],
  [/KAISER/, "Kaiser"],
  [/AETNA/, "Aetna"],
  [/BLUE (CROSS|SHIELD)|ANTHEM|UNITED ?HEALTH|CIGNA|HEALTH ?NET/, "Private insurance"],
];
function __matchInsurance(text){ const T=normOCR(text); return INS_PATTERNS.filter(p=>p[0].test(T)).map(p=>p[1]); }
window.__matchMed=__matchMed; window.__matchInsurance=__matchInsurance;  // exposed for the test suite

async function runScan(kind,key,file,step){
  const out=stage.querySelector(`[data-scanout="${key}"]`); if(!out) return;
  out.innerHTML=`<div class="scanwait">⏳ ${X("Reading the photo on this device… (about 10 seconds)","Leyendo la foto en este dispositivo… (unos 10 segundos)")}</div>`;
  let text="";
  try{
    await loadTesseract();
    const r=await Tesseract.recognize(file,"eng");
    text=(r&&r.data&&r.data.text)||"";
  }catch(err){
    out.innerHTML=`<div class="scanerr">📶 ${X("Scanning needs an internet connection the first time. You can type it instead — the biggest words on the label are the medicine name.","Escanear necesita conexión a internet la primera vez. También puede escribirlo — las palabras más grandes de la etiqueta son el nombre del medicamento.")}</div>`;
    return;
  }
  if(kind==="med"){
    const m=__matchMed(text);
    if(m.name||m.dose){
      const nm=m.name||X("(couldn't read the name — please type it)","(no pudimos leer el nombre — escríbalo por favor)");
      out.innerHTML=`<div class="scanhit"><b>${esc(nm)}</b>${m.dose?` — ${esc(m.dose)}`:""}
        <div class="btnrow">
          <button type="button" class="scanadd">✓ ${X("Add it","Agregarlo")}</button>
          <button type="button" class="scanno">${X("No, I'll type it","No, lo escribo")}</button>
        </div></div>`;
      out.querySelector(".scanadd").onclick=()=>{
        const arr=Array.isArray(data[key])?data[key]:[];
        arr.push({name:m.name||"", dose:m.dose||""}); data[key]=arr; persist();
        renderRepeat(stage.querySelector(`.repeat[data-key="${key}"]`));
        out.innerHTML=`<div class="scanok">✓ ${X("Added — please double-check the name and dose against the bottle.","Agregado — verifique el nombre y la dosis con el frasco.")}</div>`;
      };
      out.querySelector(".scanno").onclick=()=>{ out.innerHTML=""; };
    } else {
      out.innerHTML=`<div class="scanerr">🤔 ${X("We couldn't read that label. Try a closer, well-lit photo of the biggest words — or type it in.","No pudimos leer esa etiqueta. Intente una foto más cerca y con buena luz — o escríbalo.")}</div>`;
    }
  } else {
    const hits=__matchInsurance(text);
    if(hits.length){
      let sel=toArr(data[key]); hits.forEach(v=>{ if(sel.indexOf(v)<0) sel.push(v); }); data[key]=sel; persist();
      rerenderField(step,key);
      const out2=stage.querySelector(`[data-scanout="${key}"]`);
      if(out2) out2.innerHTML=`<div class="scanok">✓ ${X("Found on the card: {0} — selected it for you. Please double-check.","Encontrado en la tarjeta: {0} — lo seleccionamos por usted. Verifique por favor.",[esc(hits.join(", "))])}</div>`;
    } else {
      out.innerHTML=`<div class="scanerr">🤔 ${X("We couldn't recognize the plan on that card. Try a straight, well-lit photo of the front — or tap the choices above.","No reconocimos el plan en esa tarjeta. Intente una foto derecha y con buena luz — o toque las opciones arriba.")}</div>`;
    }
  }
}

/* ═══════════════════════════════════════════════════════════════════
   3c) 🔊 READ-ALOUD + 🎤 VOICE TYPING
   Read-aloud uses the device's built-in voices (speechSynthesis) — fully
   on-device. Voice typing uses the device's speech service; because that
   audio may be processed by Google/Apple, the FIRST use shows a plain-
   language consent note and typing stays the private default.
   ═══════════════════════════════════════════════════════════════════ */
const SPEECH_LOCALE={en:"en-US",es:"es-MX",hmn:"",vi:"vi-VN",tl:"fil-PH",pa:"pa-IN"};

function pageSpeechChunks(){
  // Visible, meaningful text only — headings, questions, hints, review/bring
  // items. Never input/textarea values except the review screen's own text.
  const sels="h1,h2,h3,.intro p,.welcome p,.wpts div,.field>label,.field>div:first-child,.hint,.tipbox,.notebox,.bri,.rev-item .k,.rev-item .v,.done-next div";
  const out=[];
  stage.querySelectorAll(sels).forEach(el=>{
    if(el.closest("[hidden],.scanout")) return;
    if(el.offsetParent===null) return;               // display:none
    const t=(el.innerText||"").replace(/\s+/g," ").trim();
    if(t && t.length>1 && out.indexOf(t)<0) out.push(t);
  });
  return out;
}
/* Clip-first player: pre-generated soft female neural voice clips (Jenny/Dalia/
   HoaiMy/Blessica) are fetched from the site's audio/ folder — same warm voice on
   EVERY device, no language pack needed. Dynamic text (the family's own answers,
   substituted names) falls back to a female-preferred device voice, softened.
   Clips are keyed by fnv64 of the display text; gen_audio.py mirrors the hash.
   Punjabi has no neural voice offered; Hmong has no TTS anywhere — both use the
   device fallback, and human-recorded clips can be dropped into audio/pa|hmn/. */
const AUDIO_BASE = window.VMRC_AUDIO_BASE ||
  (location.protocol==="file:" ? "https://vmrc-ipp.github.io/audio/" : "audio/");
const CLIP_LANGS = {en:1,es:1,vi:1,tl:1,pa:1,hmn:1};  // folders probed; missing clip → fallback
function fnv64(str){
  const b=new TextEncoder().encode(str.normalize("NFC").replace(/\s+/g," ").trim());
  let h=0xcbf29ce484222325n;
  for(const x of b){ h^=BigInt(x); h=(h*0x100000001b3n)&0xffffffffffffffffn; }
  return h.toString(16).padStart(16,"0");
}
let audioEl=null, speakToken=0;
window.__readPlan=[];   // {t,mode:"clip"|"tts"} — observability + test hook
function stopSpeak(){
  speakToken++;
  if(audioEl){ try{ audioEl.pause(); }catch(e){} audioEl=null; }
  if("speechSynthesis" in window) try{ speechSynthesis.cancel(); }catch(e){}
  const b=document.getElementById("readBtn");
  if(b){ b.classList.remove("on"); b.setAttribute("aria-pressed","false"); b.textContent="🔊"; }
}
function playClip(text,tok){
  return new Promise(res=>{
    const a=new Audio(AUDIO_BASE+lang+"/"+fnv64(text)+".mp3");
    audioEl=a;
    let started=false, settled=false;
    const done=ok=>{ if(settled) return; settled=true;
      if(ok) window.__readPlan.push({t:text,mode:"clip"});
      res(ok); };
    a.onplaying=()=>{ started=true; };
    a.onended=()=>done(true);
    a.onerror=()=>done(false);
    setTimeout(()=>{ if(!started && !settled){ try{a.pause();}catch(e){} done(false); } },8000);
    a.play().catch(()=>done(false));
  });
}
function speakUtter(text,tok){
  return new Promise(res=>{
    if(!("speechSynthesis" in window)) return res(false);
    const want=SPEECH_LOCALE[lang];
    if(!want) return res(false);                     // no recognition locale (hmn)
    const vs=speechSynthesis.getVoices();
    const cands=vs.filter(v=>(v.lang||"").toLowerCase().indexOf(want.slice(0,2).toLowerCase())===0);
    if(vs.length && !cands.length) return res(false); // device lacks this language
    const fem=/female|jenny|aria|ava|zira|susan|sonia|libby|natasha|michelle|sabina|dalia|paulina|helena|camila|hoai|linh|blessica|rosa|angela|swara|vaani|heera/i;
    const voice=cands.find(v=>fem.test(v.name))||cands[0]||null;
    const u=new SpeechSynthesisUtterance(text);
    u.lang=want; if(voice) u.voice=voice;
    u.rate=0.92; u.pitch=1.05;                       // softer, calmer delivery
    let settled=false;
    const done=ok=>{ if(settled) return; settled=true;
      if(ok) window.__readPlan.push({t:text,mode:"tts"});
      res(ok); };
    u.onend=()=>done(true);
    u.onerror=()=>done(false);
    setTimeout(()=>done(false), Math.min(20000, 3000+text.length*130)); // engine-hang guard
    try{ speechSynthesis.speak(u); }catch(e){ done(false); }
  });
}
async function speakPage(){
  const chunks=pageSpeechChunks();
  if(!chunks.length) return;
  const tok=++speakToken;
  const b=document.getElementById("readBtn");
  b.classList.add("on"); b.setAttribute("aria-pressed","true"); b.textContent="⏹";
  let played=0;
  for(const c of chunks){
    if(tok!==speakToken) return;                     // stopped / navigated away
    let ok = CLIP_LANGS[lang] ? await playClip(c,tok) : false;
    if(!ok && tok===speakToken) ok = await speakUtter(c,tok);
    if(ok) played++;
  }
  if(tok!==speakToken) return;
  stopSpeak();
  if(!played){
    alert(X("Sorry — no {0} voice is installed on this device, so read-aloud isn't available.","Lo sentimos — este dispositivo no tiene una voz en {0}, así que la lectura en voz alta no está disponible.",[langName(lang)]));
  }
}
document.getElementById("readBtn").onclick=()=>{
  const b=document.getElementById("readBtn");
  if(b.classList.contains("on")){ stopSpeak(); return; }
  speakPage();
};

function wireMic(node,step){
  node.querySelectorAll("[data-mic]").forEach(btn=>{
    const key=btn.dataset.mic;
    btn.onclick=()=>{
      const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
      if(!SR) return;
      if(!LS.get(SAVE_KEY+"_micok")){
        if(!confirm(X("Voice typing uses your device's speech service — what you say may be sent to Google or Apple to turn it into text. Don't say anything you want to keep fully private. Use voice typing?","Escribir por voz usa el servicio de voz de su dispositivo — lo que diga puede enviarse a Google o Apple para convertirlo en texto. No diga nada que quiera mantener totalmente privado. ¿Usar la voz?"))) return;
        LS.set(SAVE_KEY+"_micok","1");
      }
      const st=stage.querySelector(`[data-micstatus="${key}"]`);
      const done=()=>{ btn.classList.remove("rec"); if(st){ st.hidden=true; st.textContent=""; } };
      let r;
      try{ r=new SR(); }catch(e){ return; }
      r.lang=SPEECH_LOCALE[lang]||"en-US"; r.interimResults=false; r.maxAlternatives=1;
      btn.classList.add("rec");
      if(st){ st.hidden=false; st.textContent="🎤 "+X("Listening… speak now, then pause.","Escuchando… hable ahora y luego haga una pausa."); }
      r.onresult=e=>{
        const t=((e.results[0]&&e.results[0][0]&&e.results[0][0].transcript)||"").trim();
        if(t){ const ta=stage.querySelector(`textarea[data-key="${key}"]`);
          if(ta){ ta.value=(ta.value?ta.value.trim()+" ":"")+t;
            ta.dispatchEvent(new Event("input",{bubbles:true})); } }
      };
      r.onerror=()=>{ done();
        if(st){ st.hidden=false; st.textContent=X("Voice typing didn't work here — you can use the microphone button on your keyboard instead.","La voz no funcionó aquí — puede usar el botón de micrófono de su teclado."); } };
      r.onend=done;
      try{ r.start(); }catch(e){ done(); }
    };
  });
}

/* ═══════════════════════════════════════════════════════════════════
   4) SUBMIT — Apps Script if available, else copy/email fallback
   ═══════════════════════════════════════════════════════════════════ */
function buildPayload(){
  const answers={};
  const SKIP=["legal_name","preferred_name","dob"];  // captured at top level; avoid duplicate Sheet columns
  STEPS.forEach(s=>s.fields.forEach(f=>{ if(f.type!=="note" && f.type!=="booking" && !SKIP.includes(f.key)) answers[f.key]=displayVal(f); }));
  return {
    submittedAt: new Date().toISOString(),
    lang,
    token: window.VMRC_CONFIG.token||"",   // light anti-spam (validated by Code.gs)
    legal_name: data.legal_name||"",
    preferred_name: data.preferred_name||"",
    dob: fmtDate(data.dob),
    answers,
    raw: data
  };
}

function submit(){
  const btn=document.getElementById("sendBtn"); const err=document.getElementById("sendErr");
  err.style.display="none";
  // Honeypot: a real person can't see/fill this field, so if it has a value it's
  // a bot. Pretend it worked (show the thank-you) but never send or save it.
  const hp=document.getElementById("vmrc_company");
  if(hp && hp.value.trim()){ clearDraft(); idx=STEPS.length+1; render(); return; }
  if(!(data.legal_name||"").trim()){
    err.textContent = X("Please enter the person's name (step 1).","Por favor ingrese el nombre de la persona (paso 1).");
    err.style.display="block"; idx=0; setTimeout(()=>{persist();render();},900); return;
  }
  const payload=buildPayload();
  // ── CLOUD SUBMISSION DISABLED (privacy / Option C) ──────────────────────────
  // The form NEVER transmits anything — no Apps Script call, no Google Sheet, no
  // network request of any kind. The family hands their answers to the coordinator
  // directly via the Copy / Email / Download options below, so the information goes
  // ONLY to the coordinator they choose to send it to. Nothing is stored online.
  showFallback(payload);
}

function summaryText(p){
  let s = `VMRC PRE-MEETING INTAKE\n${"=".repeat(28)}\n`;
  s += `Name: ${p.legal_name}${p.preferred_name?` ("${p.preferred_name}")`:""}\n`;
  if(p.dob) s+=`DOB: ${p.dob}\n`;
  s += `Submitted: ${new Date(p.submittedAt).toLocaleString()}\n`;
  STEPS.forEach(step=>{
    const lines=step.fields.map(f=>{ const v=p.answers[f.key]; return v?`  • ${tx(f.label)}: ${v}`:null; }).filter(Boolean);
    if(lines.length){ s+=`\n${step.icon} ${tx(step.title).toUpperCase()}\n${lines.join("\n")}\n`; }
  });
  // Machine-readable block: lets the coordinator's IPP tool auto-fill the header
  // from this same summary (no re-typing). Identifying data only — stays between
  // the family and the coordinator. The IPP tool scans for the VMRC-IPP-DATA fence.
  s += `\n${"-".repeat(28)}\n`;
  s += (X("DATA FOR YOUR COORDINATOR — please keep these lines:\n","DATOS PARA SU COORDINADOR — por favor no borre estas líneas:\n"));
  s += "----- VMRC-IPP-DATA -----\n";
  // Full structured payload so the coordinator's IPP tool can pull in as much as
  // possible (header fields + a "Family Intake" reference panel). This travels only
  // to the coordinator the family sends it to — cloud submission is OFF.
  var _form=Object.assign({}, p.raw||{}); delete _form.__step; delete _form.__imported;
  s += JSON.stringify({ submittedAt:p.submittedAt, legal_name:p.legal_name, preferred_name:p.preferred_name, dob:p.dob, lang:p.lang, answers:p.answers, form:_form }) + "\n";
  s += "----- END -----\n";
  return s;
}

function showFallback(p){
  const fb=document.getElementById("fallback"); fb.style.display="block";
  const text=summaryText(p);
  document.getElementById("fallbackText").value=text;
  document.getElementById("copyBtn").onclick=()=>{ navigator.clipboard.writeText(text).then(()=>{
    document.getElementById("copyBtn").textContent="✓ "+(X("Copied","Copiado")); }); };
  // Download / Save-file — saves the summary as a .txt on the family's own device (no network)
  document.getElementById("dlBtn").onclick=()=>{
    const safe=((p.legal_name||"intake").replace(/[^\w\- ]+/g,"").trim().replace(/\s+/g,"_"))||"intake";
    const stamp=(p.submittedAt||"").slice(0,10)||"date";
    const blob=new Blob([text],{type:"text/plain;charset=utf-8"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download=`VMRC_Intake_${safe}_${stamp}.txt`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1500);
    document.getElementById("dlBtn").textContent="✓ "+(X("Downloaded","Descargado"));
  };
  const email=window.VMRC_CONFIG.coordinatorEmail||"";
  const subj=encodeURIComponent(`VMRC Intake — ${p.legal_name||""}`);
  const body=encodeURIComponent(text);
  // Gmail web compose — pre-fills To/Subject/Body in a Gmail tab, no default mail app needed
  document.getElementById("gmailBtn").onclick=()=>{
    window.open(`https://mail.google.com/mail/?view=cm&fs=1&to=${encodeURIComponent(email)}&su=${subj}&body=${body}`,"_blank");
  };
  // mailto — hands off to the device's default mail app (works on phones)
  document.getElementById("emailBtn").onclick=()=>{ window.location.href=`mailto:${email}?subject=${subj}&body=${body}`; };
  // Done → thank-you screen (what-to-bring checklist + clear-my-data)
  const fd=document.getElementById("fbDone");
  if(fd) fd.onclick=()=>{ idx=STEPS.length+1; persist(); render(); };
  fb.scrollIntoView({behavior:"smooth"});
}

/* ═══════════════════════════════════════════════════════════════════
   5) Values, persistence, utils
   ═══════════════════════════════════════════════════════════════════ */
function fmtDate(v){
  if(!v) return "";
  const m=String(v).match(/^(\d{4})-(\d{2})-(\d{2})$/);   // native date input → MM/DD/YYYY
  return m ? `${m[2]}/${m[3]}/${m[1]}` : String(v);
}
function displayVal(f){
  const v=data[f.key];
  if(f.type==="date") return fmtDate(v);
  if(f.type==="chips"||f.type==="dropdown"){ const a=toArr(v); return a.join(", "); }
  if(f.type==="select"){ return (toArr(v)[0]||"").toString().trim(); }
  if(f.type==="engrave"){
    const checked=engraveChecked(f.key); const parts=[];
    if(checked.includes("name")){ const x=engraveAuto("name"); if(x) parts.push("Name: "+x); }
    if(checked.includes("diagnosis")){ const x=engraveAuto("diagnosis"); if(x) parts.push("Diagnosis: "+x); }
    if(checked.includes("allergies")){ const x=engraveAuto("allergies"); if(x) parts.push("Allergies: "+x); }
    const phone=(data.medic_alert_phone||"").trim(); if(phone) parts.push("Emergency phone: "+phone);
    return parts.join("; ");
  }
  if(f.type==="repeat"){
    const arr=Array.isArray(v)?v:[];
    if(f.repeatKind==="med") return arr.filter(r=>r.name).map(r=>`${r.name}${r.dose?` — ${r.dose}`:""}`).join("\n");
    return arr.filter(r=>r.name).map(r=>`${r.name}${r.rel?` (${r.rel})`:""}${r.phone?` — ${r.phone}`:""}`).join("\n");
  }
  return (v||"").toString().trim();
}
function toArr(v){ return Array.isArray(v)?v:(v?[v]:[]); }
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function hasDraft(){ return Object.keys(data).some(k=>k!=="__step"&&data[k]&&(Array.isArray(data[k])?data[k].length:true)); }
function firstUnansweredStep(){
  // Resume where the family left off: the saved step if valid, else the
  // furthest step that already has any answer, else the first step.
  if (typeof data.__step === "number" && data.__step >= 0 && data.__step <= STEPS.length) return data.__step;
  let last = 0;
  STEPS.forEach((s,i)=>{ if (s.fields.some(f=>{ const v=data[f.key]; return v && (Array.isArray(v)?v.length:true); })) last = i; });
  return last;
}

let saveT;
function persist(light){
  data.__step=idx;
  clearTimeout(saveT);
  saveT=setTimeout(()=>{ LS.set(SAVE_KEY,JSON.stringify(data)); if(!light) flashSaved(); }, light?350:0);
}
// The debounce above leaves a 0–350ms window where typing followed immediately by a
// reload/close would lose the last keystrokes. Flush synchronously on the way out.
window.addEventListener("pagehide",()=>{ try{ clearTimeout(saveT); if(Object.keys(data).length) LS.set(SAVE_KEY,JSON.stringify(data)); }catch(e){} });
function flashSaved(){
  const e=document.getElementById("savedPill"); if(!e) return;
  e.textContent = (X("✓ Saved on this device","✓ Guardado en este dispositivo"));
  e.classList.add("show"); clearTimeout(flashSaved._t);
  flashSaved._t=setTimeout(()=>e.classList.remove("show"),1500);
}
function clearDraft(){ LS.remove(SAVE_KEY); }

// "Start from last year" — read a previously downloaded intake .txt and prefill from its
// VMRC-IPP-DATA fence. 100% on-device file read; nothing is transmitted.
function importLastYear(file){
  const fr=new FileReader();
  fr.onload=()=>{
    let obj=null;
    const m=String(fr.result||"").match(/-----\s*VMRC-IPP-DATA\s*-----\s*([\s\S]*?)\s*-----\s*END\s*-----/);
    try{ obj=JSON.parse(m?m[1]:fr.result); }catch(e){}
    if(!obj||typeof obj!=="object"){ alert(X("We couldn't read that file. Use the .txt file you downloaded from this form.","No pudimos leer ese archivo. Use el archivo .txt que descargó de este formulario.")); return; }
    let restored;
    if(obj.form && typeof obj.form==="object"){ restored=Object.assign({},obj.form); }
    else { restored={};
      if(obj.legal_name) restored.legal_name=obj.legal_name;
      if(obj.preferred_name) restored.preferred_name=obj.preferred_name;
      if(obj.dob){ const d=String(obj.dob).match(/^(\d{2})\/(\d{2})\/(\d{4})$/); restored.dob=d?(d[3]+"-"+d[1]+"-"+d[2]):obj.dob; }
    }
    delete restored.__step; restored.__imported=true;
    data=restored; persist(); idx=STEPS.length; render();
  };
  fr.readAsText(file);
}

/* ── Lang + theme ── */
function setLang(l){ lang=l; LS.set(SAVE_KEY+"_lang",l); document.documentElement.lang=l;
  document.getElementById("langBtn").textContent = "🌐 " + langName(l);
  document.title = "VMRC \u2014 " + tx(T.formTitle);
  closeLangMenu(); render(); }
function closeLangMenu(){ const m=document.getElementById("langMenu"); if(m) m.remove(); }
document.getElementById("langBtn").onclick=()=>{
  if(document.getElementById("langMenu")){ closeLangMenu(); return; }
  const m=document.createElement("div"); m.id="langMenu"; m.className="langmenu"; m.setAttribute("role","menu");
  m.innerHTML = LANGS.map(L=>`<button type="button" role="menuitem" class="lm ${L.c===lang?"on":""}" data-lm="${L.c}">${L.f?L.f+" ":""}${L.n}</button>`).join("");
  document.querySelector(".bar").appendChild(m);
  m.querySelectorAll("[data-lm]").forEach(b=>b.onclick=()=>setLang(b.dataset.lm));
  document.addEventListener("click", function h(ev){
    if(!m.contains(ev.target) && !ev.target.closest("#langBtn")){ closeLangMenu(); document.removeEventListener("click",h,{capture:true}); }
  }, {capture:true});
};

function setTheme(t){ document.documentElement.setAttribute("data-theme",t); LS.set(SAVE_KEY+"_theme",t);
  document.getElementById("themeBtn").textContent = t==="dark"?"☀️":"🌙"; }
document.getElementById("themeBtn").onclick=()=>setTheme(document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark");
setTheme(LS.get(SAVE_KEY+"_theme")|| (matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light"));
function setBig(on){ document.documentElement.classList.toggle("big",!!on); LS.set(SAVE_KEY+"_big",on?"1":"0");
  const b=document.getElementById("bigBtn"); if(b){ b.classList.toggle("on",!!on); b.setAttribute("aria-pressed",on?"true":"false"); } }
document.getElementById("bigBtn").onclick=()=>setBig(!document.documentElement.classList.contains("big"));
setBig(LS.get(SAVE_KEY+"_big")==="1");
document.getElementById("langBtn").textContent = "🌐 " + langName(lang);
document.documentElement.lang = lang;

// medication autocomplete source
(function(){ const dl=document.createElement("datalist"); dl.id="medlist";
  MED_LIST.forEach(m=>{ const o=document.createElement("option"); o.value=m.name; dl.appendChild(o); });
  document.body.appendChild(dl);
})();

// close any open dropdown when tapping elsewhere
document.addEventListener("click",()=>closeAllDropdowns());

// Keyboard activation for div-based tap targets (chips & language picker):
// Enter or Space triggers the same handler as a click, so the form is fully
// usable without a mouse / touch.
document.addEventListener("keydown",e=>{
  const t=e.target;
  if(t && t.classList && t.classList.contains("chip") && (e.key==="Enter"||e.key===" "||e.key==="Spacebar")){
    e.preventDefault(); t.click();
  }
});

try { render(); }
catch(err){
  try { document.getElementById("stage").innerHTML =
    '<div style="margin:18px;padding:16px;border:2px solid #c0392b;border-radius:12px;'
    + 'background:#fdecea;color:#7a1f17;font:13px/1.55 ui-monospace,Consolas,monospace;white-space:pre-wrap">'
    + '⚠️ The form hit an error:\n\n' + (err && err.message) + '\n\n' + ((err && err.stack)||'')
    + '\n\nScreenshot this and send it to your coordinator.</div>'; } catch(_){}
}
